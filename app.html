<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bitacora</title>
<meta name="description" content="Planificá itinerarios, controlá gastos y consultá el clima. Sin cuentas, sin servidores.">
<meta name="theme-color" content="#2563EB">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bitacora">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,700;1,9..144,400&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F5F3EE;--bg2:#EDEAE3;--white:#FFFFFF;--card2:#F9F7F4;
  --ink:#1A1714;--ink2:#5C5650;--ink3:#9C9690;
  --line:rgba(0,0,0,0.07);--line2:rgba(0,0,0,0.12);
  --blue:#2563EB;--blue-bg:#EFF4FF;--blue-bd:#BFCFFE;
  --green:#059669;--green-bg:#ECFDF5;
  --red:#DC2626;--red-bg:#FEF2F2;
  --amber:#D97706;--sky:#0EA5E9;--sky-bg:#F0F9FF;
  --r:14px;--r2:10px;--r3:20px;
  --fd:'Fraunces',Georgia,serif;--fb:'Geist',system-ui,sans-serif;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --sh:0 1px 3px rgba(0,0,0,0.06),0 4px 14px rgba(0,0,0,0.06);
  --sh2:0 2px 8px rgba(0,0,0,0.08);
}
/* ── DARK MODE ── */
body.dark {
  --bg:#141210;--bg2:#1E1C19;--white:#242220;--card2:#1A1814;
  --ink:#F0EDE8;--ink2:#A09890;--ink3:#605850;
  --line:rgba(255,255,255,0.06);--line2:rgba(255,255,255,0.1);
  --blue-bg:#1A2540;--blue-bd:#2A3F70;
  --green-bg:#0D2018;--red-bg:#2A0E0E;--sky-bg:#0A1E2A;
  --sh:0 1px 3px rgba(0,0,0,0.3),0 4px 14px rgba(0,0,0,0.25);
  --sh2:0 2px 8px rgba(0,0,0,0.3);
}
body, #app { transition: background .25s var(--ease), color .25s var(--ease); }
/* DARK MODE — extra overrides */
body.dark .hero{background:linear-gradient(135deg,#1E1B17,#252118)}
body.dark .topbar{background:var(--bg)}
body.dark .tab-bar,body.dark .tabs{background:var(--bg)}
body.dark .cday.trip{background:var(--bg2)}
body.dark .sheet{background:#1E1C19}
body.dark .si{background:#2A2724;color:var(--ink)}
body.dark .si:focus{background:#322F2A;border-color:var(--blue)}
body.dark .field input,body.dark .field textarea{background:#2A2724;color:var(--ink);border-color:var(--line2)}
body.dark .field input:focus,body.dark .field textarea:focus{background:#322F2A;border-color:var(--blue)}
body.dark .act-row,body.dark .item-row,body.dark .tl-day-row,body.dark .tl-plain-row,body.dark .day-row{background:var(--white)}
body.dark .wbtn{background:#0A1E2A;border-color:rgba(14,165,233,.3)}
body.dark .add-seg-btn{background:var(--bg2);color:var(--ink2);border-color:var(--line2)}
body.dark .rdp{background:var(--bg2);border-color:var(--line2)}
body.dark .cur-sel{background:var(--bg2);color:var(--ink);border-color:var(--line2)}
body.dark .map-place-row{background:var(--white)}
body.dark .srch-card.nm{background:var(--white)}
body.dark .srch-card.hl{background:var(--blue-bg)}
body.dark .share-btn.light{background:var(--white)}
body.dark .pack-inp{background:var(--bg2);color:var(--ink)}
body.dark .pack-cb{background:var(--bg2)}
body.dark .map-url-inp{background:var(--bg2);color:var(--ink)}
body.dark input[type=url],body.dark input[type=number],body.dark input[type=text]{background:var(--bg2);color:var(--ink)}
body.dark .items-day-hdr{background:var(--bg2)}
body.dark .tl-group-days{background:transparent}
body.dark select{background:var(--bg2);color:var(--ink)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--fb);background:var(--bg);color:var(--ink);height:100dvh;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
#app{max-width:430px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:var(--bg)}

/* Screens */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);transition:transform .32s var(--ease),opacity .32s var(--ease);will-change:transform}
.screen.gone{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.back{transform:translateX(-5%) scale(0.97);opacity:0;pointer-events:none}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:32px}

/* Topbar */
.topbar{display:flex;align-items:center;gap:10px;padding:16px 18px 10px;flex-shrink:0}
.tbk{width:36px;height:36px;border-radius:50%;background:var(--white);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--ink2);cursor:pointer;box-shadow:var(--sh2);flex-shrink:0}
.tbk:active{background:var(--bg2)}
.tbt{flex:1;font-family:var(--fd);font-size:20px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbb{height:34px;padding:0 13px;background:var(--white);border:1px solid var(--line2);border-radius:20px;font-family:var(--fb);font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:var(--sh2)}
.tbb:active{background:var(--bg2)}
.tbi{width:34px;height:34px;border-radius:50%;background:var(--white);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;box-shadow:var(--sh2);flex-shrink:0}
.tbi:active{background:var(--bg2)}
.tbi-share{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue)}
.tbi-share:active{background:var(--blue-bd)}

/* FAB */
.fab{position:absolute;right:20px;bottom:20px;width:52px;height:52px;border-radius:50%;background:var(--ink);border:none;display:flex;align-items:center;justify-content:center;font-size:22px;color:white;box-shadow:0 4px 16px rgba(0,0,0,.22);cursor:pointer;z-index:80;transition:transform .15s}
.fab:active{transform:scale(0.93)}

/* HOME */
.home-top{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0}
.wordmark{font-family:var(--fd);font-size:24px;font-weight:700;letter-spacing:-.5px}
.wordmark span{color:var(--blue)}
.count-pill{font-size:12px;font-weight:500;color:var(--ink3);background:var(--bg2);padding:4px 11px;border-radius:20px}
.hero{margin:16px 18px;border-radius:var(--r3);background:var(--ink);color:white;padding:22px;position:relative;overflow:hidden;cursor:pointer;transition:transform .15s;min-height:160px}
.hero:active{transform:scale(0.99)}
.hero-grain{position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none}
.hero-tag{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:8px}
.hero-name{font-family:var(--fd);font-size:26px;font-weight:500;line-height:1.2;margin-bottom:5px;position:relative}
.hero-dates{font-size:13px;color:rgba(255,255,255,.5);position:relative;margin-bottom:14px}
.hero-pills{display:flex;gap:7px;flex-wrap:wrap}
.hero-pill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(255,255,255,.1);display:inline-flex;align-items:center;gap:4px}
.hero-pill.g{background:rgba(5,150,105,.3);color:#6ee7b7}
.hero-pill.b{background:rgba(37,99,235,.3)}
.hero-arr{position:absolute;right:18px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:16px;color:rgba(255,255,255,.35)}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);padding:16px 20px 8px}
.tlist{padding:0 18px;display:flex;flex-direction:column;gap:8px}
.trow{background:var(--white);border-radius:var(--r);padding:13px 15px;display:flex;align-items:center;gap:11px;cursor:pointer;box-shadow:var(--sh);transition:transform .12s}
.trow:active{transform:scale(0.99)}
.tdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.df{background:var(--blue)}.do{background:var(--green)}.dp{background:var(--ink3)}
.tri{flex:1;min-width:0}
.tri h4{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tri p{font-size:12px;color:var(--ink3);margin-top:1px}
.tpill{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;flex-shrink:0}
.pf{background:var(--blue-bg);color:var(--blue)}.po{background:var(--green-bg);color:var(--green)}.pp{background:var(--bg2);color:var(--ink3)}
.past-tog{display:flex;align-items:center;gap:6px;padding:10px 20px 4px;background:none;border:none;cursor:pointer;font-family:var(--fb);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3)}
.past-tog svg{transition:transform .2s}.past-tog.open svg{transform:rotate(180deg)}
.empty{margin:28px 20px;padding:40px 24px;background:var(--white);border-radius:var(--r3);text-align:center;box-shadow:var(--sh)}
.empty .ei{font-size:42px;margin-bottom:12px}
.empty h3{font-family:var(--fd);font-size:21px;font-weight:500;margin-bottom:6px}
.empty p{font-size:13px;color:var(--ink3)}

/* TRIP HERO */
.trip-hero{margin:0 18px 14px;background:var(--white);border-radius:var(--r3);padding:18px;box-shadow:var(--sh)}
.trip-hero h2{font-family:var(--fd);font-size:24px;font-weight:500;line-height:1.2;margin-bottom:3px}
.trip-hero-dates{font-size:12px;color:var(--ink3);margin-bottom:14px}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border-radius:var(--r2);overflow:hidden}
.kpi{background:var(--card2);padding:10px;text-align:center}
.kpi-v{font-family:var(--fd);font-size:19px;font-weight:500}
.kpi-l{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.prog-card{margin:0 18px 14px;background:var(--white);border-radius:var(--r);padding:12px 15px;box-shadow:var(--sh)}
.prog-top{display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:7px}
.prog-trk{height:5px;background:var(--bg2);border-radius:5px;overflow:hidden}
.prog-bar{height:100%;border-radius:5px;background:var(--ink);transition:width .5s var(--ease)}

/* Tabs */
.tabs{display:flex;margin:0 18px 14px;background:var(--white);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--line)}
.tab{flex:1;padding:9px 2px;background:none;border:none;cursor:pointer;font-family:var(--fb);font-size:10px;font-weight:600;color:var(--ink3);display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .18s;position:relative}
.tab .ti{font-size:16px}
.tab:not(:last-child)::after{content:'';position:absolute;right:0;top:22%;bottom:22%;width:1px;background:var(--line)}
.tab.on{color:var(--blue);background:var(--blue-bg)}

/* CALENDAR */
.cal-wrap{padding:0 18px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav h3{font-family:var(--fd);font-size:17px;font-weight:500;text-transform:capitalize}
.cal-nav-btn{width:30px;height:30px;border-radius:50%;background:var(--white);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--ink2);cursor:pointer;box-shadow:var(--sh2)}
.cal-nav-btn:active{background:var(--bg2)}
.cal-table{width:100%;border-collapse:separate;border-spacing:2px}
.cal-th{font-size:9px;font-weight:700;color:var(--ink3);text-align:center;padding:0 0 6px;letter-spacing:.5px;text-transform:uppercase;width:14.28%}
.cal-td{text-align:center;padding:1px}
.cday{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:42px;min-height:42px;border-radius:8px;font-size:12px;font-weight:500;cursor:default;padding:3px 1px;gap:1px}
.cday-num{line-height:1}
.cday-lbl{font-size:7px;font-weight:700;max-width:40px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1;opacity:.85}
.cday.out{color:var(--ink3);opacity:.2}
.cday.trip{background:var(--bg2);color:var(--ink);font-weight:600;cursor:pointer}
.cday.trip:active{background:var(--line2)}
.cday.dest{background:var(--blue-bg);color:var(--blue);font-weight:700}
.cday.override{background:#FFF7ED;color:#C2410C;font-weight:700}
.cday.override.now{box-shadow:inset 0 0 0 2px #C2410C}
.cday.now{box-shadow:inset 0 0 0 2px var(--ink)}
.cday.dest.now{box-shadow:inset 0 0 0 2px var(--blue)}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.cal-li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3)}
.cal-sw{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* ITIN */
.itin-bud{margin:0 18px 12px;background:var(--white);border-radius:var(--r);padding:13px 15px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh);border-left:3px solid var(--blue)}
.itin-bud-l{font-size:11px;font-weight:600;color:var(--ink3)}
.itin-bud-v{font-family:var(--fd);font-size:20px;font-weight:500}
.itin-bud-detail{font-size:11px;color:var(--ink3);margin-top:1px}

/* TRIP SUMMARY CARD */
.trip-sum{margin:0 18px 14px;background:var(--white);border-radius:var(--r3);padding:18px;box-shadow:var(--sh);overflow:hidden;position:relative}
.trip-sum-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.trip-sum-title{font-family:var(--fd);font-size:18px;font-weight:500;line-height:1.2}
.trip-sum-meta{font-size:11px;color:var(--ink3);margin-top:3px}
.trip-sum-total{text-align:right;flex-shrink:0}
.trip-sum-total-v{font-family:var(--fd);font-size:20px;font-weight:500;color:var(--green)}
.trip-sum-total-l{font-size:10px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.dest-list{display:flex;flex-direction:column;gap:7px}
.dest-item{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--bg);border-radius:var(--r2);border:1px solid var(--line)}
.dest-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dest-item-info{flex:1;min-width:0}
.dest-item-name{font-size:13px;font-weight:600}
.dest-item-dates{font-size:11px;color:var(--ink3);margin-top:1px}
.dest-item-bud{font-size:12px;font-weight:600;color:var(--ink2);flex-shrink:0}

/* TIMELINE day rows enhancement */
.tl-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.tl-chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.tl-chip.hotel{background:#FFF7ED;color:#C2410C}
.tl-chip.flight{background:var(--sky-bg);color:var(--sky)}
.tl-chip.expense{background:var(--green-bg);color:var(--green)}
.tl-chip.note{background:var(--bg2);color:var(--ink3)}
.tl-chip.activity{background:#F3E8FF;color:#7C3AED}
.tl-chip.multi{background:var(--bg2);color:var(--ink2)}
.tl-chip.override{background:#FFF7ED;color:#C2410C}
/* Timeline vertical connector */
.tl-wrap{padding:0 18px;display:flex;flex-direction:column}
.tl-group{margin-bottom:10px}
.tl-group-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r2) var(--r2) 0 0;border:1px solid;border-bottom:none}
.tl-group-hdr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tl-group-hdr-name{font-size:13px;font-weight:700;flex:1}
.tl-group-hdr-range{font-size:10px;opacity:.7}
.tl-group-hdr-edit{font-size:11px;font-weight:600;background:none;border:none;cursor:pointer;padding:2px 6px;opacity:.8}
.tl-group-days{border:1px solid;border-top:none;border-radius:0 0 var(--r2) var(--r2);overflow:hidden}
.tl-day-row{background:var(--white);display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .12s;border-top:1px solid rgba(0,0,0,.06)}
.tl-day-row:first-child{border-top:none}
.tl-day-row:active{background:var(--bg2)}
.tl-day-num{width:30px;height:30px;border-radius:9px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:13px;color:var(--ink2);flex-shrink:0;font-weight:600}
.tl-day-num.today{background:var(--ink);color:white}
.tl-day-info{flex:1;min-width:0}
.tl-day-date{font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--ink2)}
.tl-day-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.dest-list-toggle{display:flex;align-items:center;gap:6px;padding:6px 2px;cursor:pointer;user-select:none}
.dest-list-toggle-label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px;flex:1}
.dest-list-toggle-chev{font-size:11px;color:var(--ink3);transition:transform .2s}
.dest-list-toggle-chev.open{transform:rotate(180deg)}
.tl-map-btn{flex-shrink:0;width:24px;height:24px;border-radius:6px;background:var(--blue-bg);border:1px solid var(--blue-bd);display:inline-flex;align-items:center;justify-content:center;font-size:13px;text-decoration:none;margin-left:2px;cursor:pointer;vertical-align:middle}
.tl-ungrouped{display:flex;flex-direction:column;gap:6px;padding:0 18px;margin-bottom:10px}
.tl-plain-row{background:var(--white);border-radius:var(--r2);display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;box-shadow:var(--sh);transition:background .12s}
.tl-plain-row:active{background:var(--bg2)}

/* BUDGET STATS */
.bstats{margin:0 18px 11px;display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.bstat{background:var(--white);border-radius:var(--r2);padding:11px 12px;box-shadow:var(--sh);text-align:center}
.bstat-v{font-family:var(--fd);font-size:17px;font-weight:500;color:var(--ink)}
.bstat-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);margin-top:2px}

/* DEST BUDGET SUMMARY */
.dest-bud-list{padding:0 18px 11px;display:flex;flex-direction:column;gap:6px}
.dest-bud-row{background:var(--white);border-radius:var(--r2);padding:10px 13px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh)}
.dest-bud-name{font-size:13px;font-weight:600}
.dest-bud-dates{font-size:10px;color:var(--ink3);margin-top:1px}
.dest-bud-amt{font-family:var(--fd);font-size:15px;font-weight:500}

/* CATEGORY SELECTOR */
.cat-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.cat-btn{padding:5px 10px;border-radius:20px;border:1.5px solid var(--line2);background:var(--bg);font-family:var(--fb);font-size:11px;font-weight:600;color:var(--ink3);cursor:pointer;transition:all .15s}
.cat-btn.on{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}

/* Segment groups in itin */
.seg-group{margin:0 18px 10px}
.seg-header{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--blue-bg);border-radius:var(--r2) var(--r2) 0 0;border:1px solid var(--blue-bd);border-bottom:none}
.seg-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0}
.seg-name{font-size:13px;font-weight:700;color:var(--blue);flex:1}
.seg-range{font-size:11px;color:var(--blue);opacity:.7}
.seg-edit-btn{font-size:11px;font-weight:600;color:var(--blue);background:none;border:none;cursor:pointer;padding:2px 6px}
.seg-days{display:flex;flex-direction:column;border:1px solid var(--blue-bd);border-top:none;border-radius:0 0 var(--r2) var(--r2);overflow:hidden}
.day-row{background:var(--white);display:flex;align-items:center;gap:11px;padding:11px 13px;cursor:pointer;transition:background .12s;border-top:1px solid var(--line)}
.day-row:first-child{border-top:none}
.day-row:active{background:var(--bg2)}
.day-num{width:34px;height:34px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:15px;color:var(--ink2);flex-shrink:0}
.day-num.today{background:var(--ink);color:white}
.day-i{flex:1;min-width:0}
.day-i h4{font-size:13px;font-weight:600;text-transform:capitalize;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-i p{font-size:11px;color:var(--ink3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-chev{color:var(--ink3);font-size:15px;flex-shrink:0}
/* Ungrouped days */
.day-list-plain{padding:0 18px;display:flex;flex-direction:column;gap:6px}
.day-row-plain{background:var(--white);border-radius:var(--r);display:flex;align-items:center;gap:11px;padding:11px 13px;cursor:pointer;box-shadow:var(--sh);transition:background .12s}
.day-row-plain:active{background:var(--bg2)}
/* Add segment button */
.add-seg-btn{margin:0 18px 10px;width:calc(100% - 36px);padding:11px;background:var(--white);border:1.5px dashed var(--line2);border-radius:var(--r2);font-family:var(--fb);font-size:13px;font-weight:600;color:var(--ink3);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.add-seg-btn:active{background:var(--bg2)}

/* DAY DETAIL */
.dd-top{padding:2px 20px 16px}
.dd-tag{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:3px}
.dd-title{font-family:var(--fd);font-size:24px;font-weight:500;line-height:1.2;text-transform:capitalize;margin-bottom:10px}
.dd-dest-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:20px;background:var(--blue-bg);color:var(--blue);font-size:13px;font-weight:600;margin-bottom:5px}
.w-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;background:var(--sky-bg);color:var(--sky);font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(14,165,233,.2);margin-bottom:2px}
.w-chip:active{background:#e0f2fe}.w-chip.loading{opacity:.6;pointer-events:none}
.divider{height:1px;background:var(--line);margin:2px 20px 14px}
.field{padding:0 20px 13px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.field input,.field textarea{width:100%;padding:11px 13px;background:var(--white);border:1.5px solid var(--line2);border-radius:var(--r2);color:var(--ink);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .18s;-webkit-appearance:none}
.field input:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.field input::placeholder,.field textarea::placeholder{color:var(--ink3)}
.field textarea{resize:none;height:72px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 20px 13px}
.fr-field label{display:block;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px}
.fr-field input{width:100%;padding:11px 13px;background:var(--white);border:1.5px solid var(--line2);border-radius:var(--r2);color:var(--ink);font-family:var(--fb);font-size:13px;outline:none;transition:border-color .18s;-webkit-appearance:none}
.fr-field input:focus{border-color:var(--blue)}
.fr-field input::placeholder{color:var(--ink3)}
.seg-note{margin:0 20px 13px;padding:10px 13px;background:var(--blue-bg);border-radius:var(--r2);font-size:12px;color:var(--blue);font-weight:500;border:1px solid var(--blue-bd)}
.qlinks{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:4px 20px 12px}
.gcal-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin:0 20px 16px;padding:10px;background:var(--white);border:1.5px solid var(--line2);border-radius:var(--r2);font-family:var(--fb);font-size:12px;font-weight:600;color:var(--ink2);text-decoration:none;box-shadow:var(--sh2);transition:all .15s}
.gcal-btn:active{background:var(--bg2);transform:scale(0.98)}
.gcal-act{font-size:11px;padding:2px 7px;border-radius:6px;border:none;background:var(--bg2);color:var(--ink3);cursor:pointer;font-family:var(--fb);font-weight:600;flex-shrink:0;transition:background .15s}
.gcal-act:active{background:var(--blue-bg);color:var(--blue)}
.ql{padding:10px 3px;background:var(--white);border:1.5px solid var(--line2);border-radius:var(--r2);font-size:11px;font-weight:600;text-align:center;text-decoration:none;color:var(--ink2);display:flex;flex-direction:column;align-items:center;gap:3px;box-shadow:var(--sh2)}
.ql:active{background:var(--bg2)}.ql .qi{font-size:17px}
.ql.disabled{opacity:.3;pointer-events:none}
.ql.bl{color:var(--blue);background:var(--blue-bg);border-color:var(--blue-bd)}
.ql.sk{color:var(--sky);background:var(--sky-bg);border-color:rgba(14,165,233,.2)}

/* BUDGET */
.bud-top{padding:0 18px 14px}
.bsummary{background:var(--white);border-radius:var(--r3);padding:18px;box-shadow:var(--sh);margin-bottom:11px}
.bsummary-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px}
.bbig{font-family:var(--fd);font-size:32px;font-weight:500}
.bbig.g{color:var(--green)}.bbig.r{color:var(--red)}
.bsub{font-size:11px;color:var(--ink3);margin-top:1px}
.bprog-trk{height:7px;background:var(--bg2);border-radius:7px;overflow:hidden;margin-bottom:8px}
.bprog-bar{height:100%;border-radius:7px}
.bprog-bar.ok{background:linear-gradient(90deg,var(--green),#34d399)}
.bprog-bar.over{background:linear-gradient(90deg,var(--red),#f87171)}
.bprog-lbls{display:flex;justify-content:space-between;font-size:10px;font-weight:600;color:var(--ink3)}
.bminis{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:11px}
.bmini{background:var(--card2);border-radius:var(--r2);padding:11px 12px;border:1px solid var(--line)}
.bmini-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:3px}
.bmini-v{font-family:var(--fd);font-size:17px;font-weight:500}
.bmini-v.r{color:var(--red)}.bmini-v.a{color:var(--amber)}
.cur-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.cur-row label{font-size:11px;font-weight:600;color:var(--ink3)}
.cur-sel{padding:6px 11px;background:var(--white);border:1.5px solid var(--line2);border-radius:var(--r2);font-family:var(--fb);font-size:12px;color:var(--ink);outline:none;cursor:pointer}
.brows{padding:0 18px;display:flex;flex-direction:column;gap:7px}
.brow{background:var(--white);border-radius:var(--r);padding:12px;box-shadow:var(--sh)}
.brow-head{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.bnum{width:32px;height:32px;border-radius:9px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:14px;color:var(--ink2);flex-shrink:0}
.brow-i{flex:1;min-width:0}
.brow-i h5{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brow-i p{font-size:10px;color:var(--ink3);margin-top:1px}
.bdiff{font-size:11px;font-weight:700;flex-shrink:0}
.bdiff.ok{color:var(--green)}.bdiff.ov{color:var(--red)}.bdiff.ne{color:var(--ink3)}
.binps{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.binp-w label{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:3px}
.binp{width:100%;padding:8px 9px;background:var(--bg2);border:1.5px solid transparent;border-radius:8px;color:var(--ink);font-family:var(--fb);font-size:13px;outline:none;transition:border-color .18s;-webkit-appearance:none}
.binp:focus{border-color:var(--blue);background:var(--white)}

/* WEATHER */
.wtab{padding:0 18px}
.w-empty{background:var(--white);border-radius:var(--r3);padding:34px 22px;text-align:center;box-shadow:var(--sh)}
.w-empty .wi{font-size:38px;margin-bottom:10px}.w-empty p{font-size:13px;color:var(--ink3)}
.wgrid{display:flex;flex-direction:column;gap:7px}
.wrow{background:var(--white);border-radius:var(--r);padding:13px 14px;box-shadow:var(--sh);display:flex;align-items:center;gap:11px;cursor:pointer;transition:transform .12s}
.wrow:active{transform:scale(0.99)}
.wbadge{width:38px;height:38px;border-radius:11px;background:var(--sky-bg);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:16px;color:var(--sky);flex-shrink:0}
.wi2{flex:1;min-width:0}
.wi2 h5{font-size:13px;font-weight:600}
.wi2 p{font-size:11px;color:var(--sky);font-weight:500;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wright{text-align:right;flex-shrink:0}
.wemoji{font-size:24px}
.wtemp{font-size:11px;font-weight:600;color:var(--ink2)}
.wbtn{padding:4px 11px;border-radius:20px;background:var(--sky-bg);border:1px solid rgba(14,165,233,.2);color:var(--sky);font-size:10px;font-weight:700;cursor:pointer;font-family:var(--fb)}
.wall-btn{width:100%;margin-top:9px;padding:12px;background:var(--blue-bg);border:1.5px solid var(--blue-bd);border-radius:var(--r2);color:var(--blue);font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer}
.wall-btn:active{background:#dbe9ff}


/* TRIP BUDGET INPUT */
.trip-bud-bar{margin:0 18px 11px;display:flex;align-items:center;gap:8px;background:var(--white);border-radius:var(--r);padding:12px 15px;box-shadow:var(--sh);overflow:hidden}
.tbb-label{font-size:11px;font-weight:700;color:var(--ink3);flex-shrink:0;white-space:nowrap}
.tbb-inp{flex:1;min-width:0;padding:6px 9px;background:var(--bg2);border:1.5px solid transparent;border-radius:8px;font-family:var(--fd);font-size:18px;font-weight:500;color:var(--ink);outline:none;-webkit-appearance:none;text-align:right;width:0}
.tbb-inp:focus{border-color:var(--blue);background:var(--white)}
.tbb-sym{font-size:12px;font-weight:700;color:var(--ink3);flex-shrink:0}
/* BUDGET ALERT */
.bud-alert{margin:0 18px 11px;padding:11px 14px;background:#FEF2F2;border:1.5px solid #FECACA;border-radius:var(--r2);font-size:12px;font-weight:600;color:var(--red);display:flex;align-items:center;gap:8px}
/* EXPENSE ITEMS */
.items-sec{padding:0 18px 4px}
.items-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.items-lbl{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1px}
.add-item-btn{padding:5px 13px;background:var(--ink);border:none;border-radius:20px;color:white;font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px}
.add-item-btn:active{opacity:.8}
.item-row{background:var(--white);border-radius:var(--r2);padding:11px 13px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh);margin-bottom:6px}
.item-ico{font-size:22px;flex-shrink:0;width:30px;text-align:center}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-cat{font-size:10px;color:var(--ink3);margin-top:1px}
.item-price{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--ink);flex-shrink:0;margin-right:5px}
.item-acts{display:flex;gap:4px;flex-shrink:0}
.item-btn{width:28px;height:28px;border-radius:8px;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.item-btn.e{background:var(--blue-bg);color:var(--blue)}
.item-btn.d{background:var(--red-bg);color:var(--red)}
.no-items{text-align:center;padding:22px 0;color:var(--ink3);font-size:13px}
/* CHARTS */
.charts-sec{padding:0 18px 11px}
.chart-card{background:var(--white);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:9px}
.chart-hdr{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:13px}
.pie-wrap{display:flex;align-items:center;gap:14px}
.pie-legend{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0}
.pie-leg-row{display:flex;align-items:center;gap:7px;font-size:11px}
.pie-leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pie-leg-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink2)}
.pie-leg-pct{font-weight:700;color:var(--ink);flex-shrink:0;font-size:10px}
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.bar-lbl{width:90px;font-size:11px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-trk{flex:1;height:8px;background:var(--bg2);border-radius:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;transition:width .5s}
.bar-val{width:56px;text-align:right;font-size:10px;font-weight:700;color:var(--ink);flex-shrink:0}
/* BUDGET CAT ROW INPUT */
.bcat-inp{width:88px;padding:5px 8px;text-align:right;background:var(--bg2);border:1.5px solid transparent;border-radius:8px;font-family:var(--fd);font-size:15px;font-weight:500;outline:none;-webkit-appearance:none;transition:border-color .15s}
.bcat-inp:focus{border-color:var(--blue);background:var(--white)}
.bcat-over{border-color:var(--red)!important;color:var(--red)}

/* DAILY DETAIL TOGGLE */
.daily-tog{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;cursor:pointer;border-top:1px solid var(--line);margin-bottom:4px}
.daily-tog-lbl{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1px}
.daily-tog svg{transition:transform .2s}
.daily-tog.open svg{transform:rotate(180deg)}
/* ACTIVITIES in day screen */
.act-sec{padding:0 20px 8px}
.act-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.act-lbl{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1px}
.add-act-btn{padding:4px 11px;background:var(--blue-bg);border:1.5px solid var(--blue-bd);border-radius:20px;color:var(--blue);font-family:var(--fb);font-size:11px;font-weight:600;cursor:pointer}
.act-row{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--white);border-radius:var(--r2);margin-bottom:5px;box-shadow:var(--sh2)}
.act-ico{font-size:18px;flex-shrink:0}
.act-name{flex:1;font-size:13px;font-weight:500}
.act-del{background:none;border:none;cursor:pointer;font-size:16px;color:var(--ink3);padding:3px 5px;border-radius:6px}
.act-del:active{background:var(--red-bg);color:var(--red)}

/* DATE PREVIEW */
.date-preview{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--blue-bg);border-radius:var(--r2);border:1px solid var(--blue-bd);margin-top:6px;font-size:12px;font-weight:600;color:var(--blue)}
.date-preview .dp-arrow{color:var(--blue);opacity:.6}
.date-preview .dp-nights{margin-left:auto;font-size:10px;background:var(--blue);color:white;padding:2px 7px;border-radius:20px}

/* SHEETS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);backdrop-filter:blur(4px);z-index:200;animation:fi .2s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-radius:22px 22px 0 0;z-index:201;animation:su .27s var(--ease);padding-bottom:max(env(safe-area-inset-bottom,0px),16px);max-height:90dvh;overflow-y:auto}
@keyframes su{from{transform:translateX(-50%) translateY(100%)}to{transform:translateX(-50%) translateY(0)}}
.sh-handle{width:36px;height:4px;background:var(--line2);border-radius:4px;margin:11px auto 0}
.sh-body{padding:18px 20px 2px}
.sh-title{font-family:var(--fd);font-size:21px;font-weight:500;margin-bottom:18px}
.sf{margin-bottom:12px;position:relative}
.sf label{display:block;font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:5px}
.si{width:100%;padding:12px 13px;background:var(--bg);border:1.5px solid var(--line2);border-radius:var(--r2);color:var(--ink);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .18s;-webkit-appearance:none}
.si:focus{border-color:var(--blue);background:var(--white)}
.si::placeholder{color:var(--ink3)}
.sf-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.sf-row .sf{margin-bottom:0}
.sh-btns{display:grid;grid-template-columns:1fr 2fr;gap:9px;padding:14px 20px}
.btn-can{padding:13px;background:var(--bg2);border:none;border-radius:var(--r2);font-family:var(--fb);font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer}
.btn-ok{padding:13px;background:var(--ink);border:none;border-radius:var(--r2);font-family:var(--fb);font-size:13px;font-weight:700;color:white;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.16)}
.btn-ok:active{transform:scale(0.97)}
.btn-del{padding:13px;background:var(--red-bg);border:none;border-radius:var(--r2);font-family:var(--fb);font-size:13px;font-weight:700;color:var(--red);cursor:pointer}

/* City autocomplete dropdown — lives outside .sheet */
#city-drop{position:fixed;background:var(--white);border:1.5px solid var(--blue-bd);border-radius:var(--r2);box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:500;overflow:hidden;display:none;min-width:240px;max-width:calc(100vw - 40px)}
.city-item{padding:11px 14px;cursor:pointer;display:flex;flex-direction:column;gap:1px;transition:background .1s}
.city-item:not(:last-child){border-bottom:1px solid var(--line)}
.city-item:active,.city-item.hover{background:var(--blue-bg)}
.city-name{font-size:13px;font-weight:600;color:var(--ink)}
.city-sub{font-size:11px;color:var(--ink3)}
.city-loading{padding:12px 14px;font-size:13px;color:var(--ink3)}

/* Toast */
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--ink);color:white;border-radius:20px;padding:8px 17px;font-size:12px;font-weight:500;z-index:600;opacity:0;transition:all .25s var(--ease);pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MAP TAB */
.map-wrap{padding:0 18px}
.map-dest-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:11px;overflow:hidden}
.map-dest-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line)}
.map-dest-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.map-dest-name{font-size:14px;font-weight:700;flex:1;color:var(--ink)}
.map-dest-dates{font-size:11px;color:var(--ink3);margin-top:1px}
.map-open-btn{padding:5px 11px;border-radius:20px;background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--blue);font-family:var(--fb);font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;flex-shrink:0}
.map-open-btn:active{background:var(--blue-bd)}
.map-place-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
.map-place-row:last-child{border-bottom:none}
.map-place-row:active{background:var(--bg2)}
.map-place-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.map-place-info{flex:1;min-width:0}
.map-place-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.map-place-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.map-place-arr{font-size:16px;color:var(--ink3);flex-shrink:0}
.map-empty{background:var(--white);border-radius:var(--r3);padding:36px 24px;text-align:center;box-shadow:var(--sh);color:var(--ink3);font-size:13px}
.map-empty-icon{font-size:40px;margin-bottom:12px}

/* TRIP NOTES */
.trip-notes-card{margin:0 18px 14px;background:var(--white);border-radius:var(--r);box-shadow:var(--sh)}
.trip-notes-hdr{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--line)}
.trip-notes-hdr.open{border-bottom:1px solid var(--line)}
.trip-notes-lbl{flex:1;font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1px}
.trip-notes-chev{font-size:14px;color:var(--ink3);transition:transform .2s}
.trip-notes-hdr.open .trip-notes-chev{transform:rotate(180deg)}
.trip-notes-body{padding:0 14px 12px}
.trip-notes-ta{width:100%;min-height:90px;padding:10px 12px;background:var(--bg2);border:1.5px solid transparent;border-radius:var(--r2);font-family:var(--fb);font-size:13px;color:var(--ink);resize:vertical;outline:none;transition:border-color .18s;-webkit-appearance:none}
.trip-notes-ta:focus{border-color:var(--blue);background:var(--white)}

/* BACKUP BUTTONS (home) */
.home-backup{display:flex;gap:7px;padding:10px 20px 0}
.backup-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 10px;background:var(--white);border:1px solid var(--line2);border-radius:var(--r2);font-family:var(--fb);font-size:11px;font-weight:600;color:var(--ink2);cursor:pointer;box-shadow:var(--sh2)}
.backup-btn:active{background:var(--bg2)}
#backup-file-input{display:none}

/* HOME TAGLINE */
.home-tagline{padding:4px 20px 2px;font-size:12px;color:var(--ink3);line-height:1.5}
.home-features{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:16px 20px 4px}
.hf-card{background:var(--white);border-radius:var(--r);padding:13px 10px 11px;text-align:center;box-shadow:var(--sh);display:flex;flex-direction:column;align-items:center;gap:5px}
.hf-icon{font-size:22px}
.hf-label{font-size:11px;font-weight:700;color:var(--ink2)}
.hf-sub{font-size:10px;color:var(--ink3);line-height:1.4}

/* RANGE DATE PICKER */
.rdp{background:var(--card2);border-radius:var(--r);padding:12px;border:1.5px solid var(--line2)}
.rdp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rdp-title{font-size:13px;font-weight:700;color:var(--ink)}
.rdp-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--line2);background:var(--white);cursor:pointer;font-size:16px;color:var(--ink2);display:flex;align-items:center;justify-content:center;box-shadow:var(--sh2)}
.rdp-btn:active{background:var(--bg2)}
.rdp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.rdp-dh{text-align:center;font-size:9px;font-weight:700;color:var(--ink3);padding:3px 0 5px;text-transform:uppercase}
.rdp-d{text-align:center;font-size:12px;padding:7px 2px;border-radius:6px;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent}
.rdp-d:active:not(.rdp-empty):not(.rdp-dis){background:var(--bg2)}
.rdp-empty{cursor:default}
.rdp-dis{color:var(--ink3);opacity:.35;cursor:not-allowed}
.rdp-sel{background:var(--ink)!important;color:white!important;font-weight:700;border-radius:8px}
.rdp-range{background:#BFDBFE;color:#1D4ED8;font-weight:600}
.rdp-today{font-weight:800;color:var(--blue)}
.rdp-preview{text-align:center;font-size:12px;color:var(--ink2);margin-top:10px;padding-top:10px;border-top:1px solid var(--line);min-height:18px;font-weight:500}
.sf-rdp-label{font-size:11px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}

/* CUSTOM MAP FIELD */
.map-url-field{margin:0 18px 10px}
.map-url-row{display:flex;gap:7px;align-items:center}
.map-url-inp{flex:1;padding:10px 12px;background:var(--white);border:1.5px solid var(--line2);border-radius:var(--r2);font-family:var(--fb);font-size:13px;color:var(--ink);outline:none;-webkit-appearance:none;min-width:0}
.map-url-inp:focus{border-color:var(--blue)}
.map-url-open{flex-shrink:0;padding:10px 13px;background:var(--ink);color:white;border:none;border-radius:var(--r2);font-family:var(--fb);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;text-decoration:none;display:flex;align-items:center;gap:5px}
.map-url-open:active{opacity:.85}
.map-embed{margin:0 18px 14px;border-radius:var(--r);overflow:hidden;border:1.5px solid var(--line2);position:relative;background:var(--bg2)}
.map-embed iframe{width:100%;height:240px;border:none;display:block}
.map-embed-label{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;padding:7px 10px 0}
.map-embed-tip{font-size:10px;color:var(--ink3);padding:4px 0 8px;line-height:1.5}

/* SEARCH TAB */
.srch-wrap{padding:0 18px 24px}
.srch-dest-selector{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none}
.srch-dest-selector::-webkit-scrollbar{display:none}
.srch-dest-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--line2);background:var(--white);font-family:var(--fb);font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;transition:all .15s;box-shadow:var(--sh2)}
.srch-dest-btn.on{background:var(--ink);color:white;border-color:var(--ink)}
.srch-dest-btn:active{transform:scale(0.96)}
.srch-section{margin-bottom:18px}
.srch-section-title{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
.srch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.srch-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:16px 10px;background:var(--white);border-radius:var(--r);border:1.5px solid var(--line2);text-decoration:none;color:var(--ink);box-shadow:var(--sh);transition:transform .15s,box-shadow .15s;cursor:pointer;text-align:center}
.srch-card:active{transform:scale(0.97);box-shadow:none}
.srch-card-icon{font-size:28px}
.srch-card-label{font-size:12px;font-weight:700;color:var(--ink)}
.srch-card-sub{font-size:10px;color:var(--ink3);line-height:1.4}
.srch-card.highlight{background:var(--blue-bg);border-color:var(--blue-bd)}
.srch-card.highlight .srch-card-label{color:var(--blue)}
.srch-tip{font-size:11px;color:var(--ink3);text-align:center;padding:12px 0 4px;line-height:1.6}
/* PACKING CHECKLIST */
.pack-card{margin:0 18px 14px;background:var(--white);border-radius:var(--r);box-shadow:var(--sh)}
.pack-hdr{display:flex;align-items:center;gap:8px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--line)}
.pack-lbl{flex:1;font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1px}
.pack-chev{font-size:14px;color:var(--ink3);transition:transform .2s}
.pack-hdr.open .pack-chev{transform:rotate(180deg)}
.pack-body{padding:10px 14px 12px}
.pack-item{display:flex;align-items:center;gap:9px;padding:6px 2px;border-bottom:1px solid var(--line)}
.pack-item:last-child{border:none}
.pack-cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--white);transition:all .15s}
.pack-cb.done{background:var(--green);border-color:var(--green)}
.pack-name{flex:1;font-size:13px;color:var(--ink);transition:opacity .2s}
.pack-name.done{opacity:.4;text-decoration:line-through}
.pack-del{background:none;border:none;cursor:pointer;font-size:14px;color:var(--ink3);padding:2px 4px;opacity:.6}
.pack-add-row{display:flex;gap:7px;margin-top:8px}
.pack-inp{flex:1;padding:9px 12px;background:var(--bg2);border:1.5px solid transparent;border-radius:var(--r2);font-family:var(--fb);font-size:13px;color:var(--ink);outline:none;-webkit-appearance:none}
.pack-inp:focus{border-color:var(--blue);background:var(--white)}
.pack-add-btn{padding:9px 14px;background:var(--ink);color:white;border:none;border-radius:var(--r2);font-family:var(--fb);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.pack-clear{width:100%;margin-top:6px;padding:7px;background:transparent;border:1px solid var(--line2);border-radius:var(--r2);font-family:var(--fb);font-size:11px;font-weight:600;color:var(--ink3);cursor:pointer}
.pack-clear:active{background:var(--bg2)}

/* ITEMS DAY GROUPING */
.items-day-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;margin:8px -2px 2px;background:var(--bg2);border-radius:var(--r2);border-left:3px solid var(--line2)}
.items-day-label{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--ink2)}
.items-day-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.items-day-total{font-size:12px;font-weight:700;color:var(--ink);font-family:var(--fd)}
.pack-progress{font-size:10px;color:var(--green);font-weight:700;margin-left:auto;margin-right:4px}
</style>
</head>

// ── Item stats (trip-level expenses) ──
function itemStats(t){
  if(!t) return{budget:0,spent:0,rem:0,catTotal:0,totalBudget:0,spentByCat:{},bbc:{},pctByCat:{}};
  const items=Array.isArray(t.items)?t.items:[];
  const spent=items.reduce((s,itm)=>s+(parseFloat(itm.price)||0),0);
  const bbc=t.budgetByCat||{};
  const spentByCat={};
  const pctByCat={};
  items.forEach(itm=>{
    const k=itm.category||'other';
    spentByCat[k]=(spentByCat[k]||0)+(parseFloat(itm.price)||0);
  });
  let catTotal=0;
  Object.keys(bbc).forEach(cat=>{
    const bud=parseFloat(bbc[cat])||0;
    const sp=spentByCat[cat]||0;
    pctByCat[cat]=bud>0?Math.min(100,Math.round(sp/bud*100)):0;
    catTotal+=bud;
  });
  const totalBudget=parseFloat(t.totalBudget)||0;
  // totalBudget wins if set; otherwise use category sum
  const budget=totalBudget>0?totalBudget:catTotal;
  return{budget,spent,rem:budget-spent,catTotal,totalBudget,spentByCat,bbc,pctByCat};
}
function updBudgetCat(cat,val){
  const t=trip(); if(!t) return;
  if(!t.budgetByCat) t.budgetByCat={};
  t.budgetByCat[cat]=val;
  clearTimeout(updBudgetCat._t);
  updBudgetCat._t=setTimeout(()=>{save();render();},400);
}

// ── SVG Donut Pie chart ──
function renderPie(items,sym){
  const byCat={};
  items.forEach(itm=>{
    const k=itm.category||'other';
    if(!byCat[k]) byCat[k]=0;
    byCat[k]+=parseFloat(itm.price)||0;
  });
  const data=Object.entries(byCat).map(([k,v],i)=>({k,v,icon:icatIcon(k),label:icatLabel(k),color:CHART_COLORS[i%CHART_COLORS.length]})).sort((a,b)=>b.v-a.v);
  const total=data.reduce((s,d)=>s+d.v,0);
  if(!total) return '';
  const sz=148,cx=sz/2,cy=sz/2,r=sz*0.38,ir=sz*0.22;
  let ang=-Math.PI/2,paths='';
  data.forEach(d=>{
    const sl=(d.v/total)*2*Math.PI;
    const x1=cx+Math.cos(ang)*r,y1=cy+Math.sin(ang)*r;
    ang+=sl;
    const x2=cx+Math.cos(ang)*r,y2=cy+Math.sin(ang)*r;
    const ix1=cx+Math.cos(ang-sl)*ir,iy1=cy+Math.sin(ang-sl)*ir;
    const ix2=cx+Math.cos(ang)*ir,iy2=cy+Math.sin(ang)*ir;
    const lg=sl>Math.PI?1:0;
    paths+=`<path d="M${ix1.toFixed(1)},${iy1.toFixed(1)} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} L${ix2.toFixed(1)},${iy2.toFixed(1)} A${ir},${ir} 0 ${lg},0 ${ix1.toFixed(1)},${iy1.toFixed(1)} Z" fill="${d.color}"/>`;
  });
  const legend=data.map(d=>`<div class="pie-leg-row"><div class="pie-leg-dot" style="background:${d.color}"></div><div class="pie-leg-name">${d.icon} ${d.label}</div><div class="pie-leg-pct">${Math.round(d.v/total*100)}%</div></div>`).join('');
  return `<div class="pie-wrap"><svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}" style="flex-shrink:0">${paths}</svg><div class="pie-legend">${legend}</div></div>`;
}

// ── Horizontal bar chart ──
function renderBars(items,sym){
  const byCat={};
  items.forEach(itm=>{
    const k=itm.category||'other';
    if(!byCat[k]) byCat[k]=0;
    byCat[k]+=parseFloat(itm.price)||0;
  });
  const data=Object.entries(byCat).map(([k,v],i)=>({k,v,icon:icatIcon(k),label:icatLabel(k),color:CHART_COLORS[i%CHART_COLORS.length]})).sort((a,b)=>b.v-a.v);
  const max=data[0]?.v||1;
  return data.map(d=>`<div class="bar-row"><div class="bar-lbl">${d.icon} ${d.label}</div><div class="bar-trk"><div class="bar-fill" style="width:${Math.round(d.v/max*100)}%;background:${d.color}"></div></div><div class="bar-val">${sym} ${d.v.toLocaleString(loc(),{maximumFractionDigits:0})}</div></div>`).join('');
}

// Helper: build affiliate URLs
function affBooking(dest, year, month, day) {
  if(!dest) return 'https://www.booking.com';
  const enc = encodeURIComponent(dest);
  const y=year||''; const m=parseInt(month)||''; const d=parseInt(day)||'';
  return `https://www.booking.com/search.html?ss=${enc}${y?`&checkin_year=${y}&checkin_month=${m}&checkin_monthday=${d}`:''}&affiliate_id=${AFF.booking}&label=bitacora`;
}
function affSkyscanner(dest, dateFrom, dateTo) {
  const enc = encodeURIComponent(dest);
  const partner = AFF.skyscanner !== 'SKYSCANNER_PARTNER_ID' ? '&partnerId='+AFF.skyscanner : '';
  // With dates: deep link to specific route search (better for alerts)
  if(dateFrom && dateTo) {
    // Format: YYMMDD
    const fmt = d => d.replace(/-/g,'').slice(2); // 2026-06-15 → 260615
    return 'https://www.skyscanner.com/transport/flights/anywhere/'+enc+'/'+fmt(dateFrom)+'/'+fmt(dateTo)+'/?adults=1'+partner+'&utm_source=bitacora';
  }
  return 'https://www.skyscanner.com/flights-to/'+enc+'/?adults=1'+partner+'&utm_source=bitacora';
}

// ─── URL SHARE encode/decode ───
async function encodeTrip(t){
  const json=JSON.stringify(t);
  try {
    const cs=new CompressionStream('gzip');
    const w=cs.writable.getWriter();
    const enc=new TextEncoder();
    w.write(enc.encode(json)); w.close();
    const buf=await new Response(cs.readable).arrayBuffer();
    const bytes=new Uint8Array(buf);
    let b64='';
    bytes.forEach(b=>b64+=String.fromCharCode(b));
    return btoa(b64).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  } catch(e){
    // Fallback without compression
    return btoa(encodeURIComponent(json)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  }
}
async function decodeTrip(hash){
  try {
    const b64=(hash+'==').replace(/-/g,'+').replace(/_/g,'/');
    const raw=atob(b64);
    const bytes=new Uint8Array(raw.length);
    for(let i=0;i<raw.length;i++) bytes[i]=raw.charCodeAt(i);
    try {
      const ds=new DecompressionStream('gzip');
      const w=ds.writable.getWriter();
      w.write(bytes); w.close();
      const text=await new Response(ds.readable).text();
      return JSON.parse(text);
    } catch(e){
      // Fallback: no compression
      return JSON.parse(decodeURIComponent(atob(b64)));
    }
  } catch(e){ return null; }
}
async function generateShareLink(){
  const t=trip(); if(!t) return;

function migrateData(trips, fromVersion) {
  // v1 → v2: ensure trip.notes field
  if(fromVersion < 2) {
    trips.forEach(t => {
      if(t.notes === undefined) t.notes = '';
    });
  }
  return trips;
}

async function load() {
  // Check for shared trip in URL hash
  const hash=window.location.hash;
  if(hash.startsWith('#btc=')){
    const encoded=hash.slice(5);
    const decoded=await decodeTrip(encoded);
    if(decoded){
      ensureFields(decoded);
      S._sharedTrip=decoded;
      S._readOnly=true;
      S.tid=null;
      S.trips=[decoded];
      S.tid=decoded.id;
      S.scr='trip';
      render();
      return;
    }
  }
  // Load from localStorage
  try {
    const local = localStorage.getItem('btc-v4');
    if(local) {
      S.trips = JSON.parse(local);
      // Data versioning: check and migrate if needed
      const savedVersion = parseInt(localStorage.getItem('btc-data-version')||'1', 10);
      if(savedVersion < DATA_VERSION) {
        S.trips = migrateData(S.trips, savedVersion);
        localStorage.setItem('btc-data-version', String(DATA_VERSION));
        localStorage.setItem('btc-v4', JSON.stringify(S.trips));
      }
    } else {
      // Fallback: try artifact storage (Claude.ai only)
      if(window.storage){const r=await window.storage.get('vgr-v4');if(r?.value)S.trips=JSON.parse(r.value);}
    }
  } catch(e){}
  render();
}

function importBackup(input) {
  const file = input.files?.[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      // Accept both raw array and wrapped {trips:[...]} format
      const trips = Array.isArray(data) ? data : (Array.isArray(data.trips) ? data.trips : null);
      if(!trips) throw new Error('invalid');
      const fromVersion = data.version || 1;
      const migrated = migrateData(trips, fromVersion);

function mkDays(start,end) {
  const out=[];
  // Use T12:00 to avoid UTC/local timezone off-by-one on date parsing
  const s=new Date(start+'T12:00'), e=new Date(end+'T12:00');
  for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
    out.push({date:`${y}-${m}-${dd}T12:00:00`,
      flight:'',flightUrl:'',hotel:'',hotelUrl:'',
      notes:'',budget:'',expense:'',category:'',
      dayDest:'',dayDestLat:'',dayDestLon:'',dayDestFull:''});
  }
  return out;
}
function ensureFields(t) {
  if(!t.segments) t.segments=[];
  if(!t.currency) t.currency='USD';
  if(!t.items) t.items=[];
  if(t.totalBudget===undefined) t.totalBudget='';
  if(!t.budgetByCat) t.budgetByCat={};
  if(t.notes===undefined) t.notes=''; // trip-level notes (v2)
  t.days.forEach(d=>{
    ['budget','expense','flightUrl','hotelUrl','mapUrl','category','notes','dayDest','dayDestLat','dayDestLon','dayDestFull'].forEach(f=>{if(d[f]===undefined)d[f]='';});
    if(!d.activities) d.activities=[];
    if(!Array.isArray(d.hotels)) d.hotels=d.hotel?[d.hotel]:[];
    if(!Array.isArray(d.flights)) d.flights=d.flight?[d.flight]:[];
    delete d.dest; delete d.destLat; delete d.destLon; delete d.destFull;
    // Normalize date to T12:00:00 to avoid timezone off-by-one
    if(d.date && !d.date.endsWith('T12:00:00')){
      d.date = d.date.split('T')[0] + 'T12:00:00';
    }
  });
}
function status(t) {
  // Use string comparison (YYYY-MM-DD) to avoid timezone off-by-one
  const todayStr=new Date().toLocaleDateString('en-CA');
  const sStr=t.startDate.split('T')[0];
  const eStr=t.endDate.split('T')[0];
  if(todayStr>eStr){
    const e=new Date(eStr+'T12:00'); const td=new Date(todayStr+'T12:00');
    return{type:'past',n:Math.round((td-e)/864e5)};
  }
  if(todayStr>=sStr){
    const s=new Date(sStr+'T12:00'); const td=new Date(todayStr+'T12:00');
    return{type:'ongoing',n:Math.round((td-s)/864e5)+1};
  }
  const s=new Date(sStr+'T12:00'); const td=new Date(todayStr+'T12:00');
  return{type:'future',n:Math.round((s-td)/864e5)};
}
function loc(){return S.lang==='en'?'en-US':'es-ES';}

function wmoEmoji(c){if(c===0)return'☀️';if(c<=2)return'🌤️';if(c===3)return'☁️';if(c<=48)return'🌫️';if(c<=57)return'🌦️';if(c<=67)return'🌧️';if(c<=77)return'🌨️';if(c<=82)return'🌧️';if(c<=86)return'❄️';return'⛈️';}
function budStats(t) {
  let b=0,e=0;
  t.days.forEach(d=>{b+=parseFloat(d.budget)||0;e+=parseFloat(d.expense)||0;});
  return{b,e,rem:b-e};
}
function budStatsByDest(t) {
  // Returns [{dest, fromIdx, toIdx, expense}] per segment
  // Override days are counted toward their raw segment's bucket
  if(!t.segments?.length) return [];
  return t.segments.map(seg=>{
    let e=0;
    for(let i=seg.fromIdx;i<=Math.min(seg.toIdx,t.days.length-1);i++)
      e+=parseFloat(t.days[i].expense)||0;
    return{dest:seg.dest,fromIdx:seg.fromIdx,toIdx:seg.toIdx,e};
  });
}
// Per-effective-destination spending (groups by effectiveSeg.dest)
function budStatsByEffDest(t) {
  const map={};
  t.days.forEach((d,i)=>{
    const eff=effectiveSeg(t,i);
    const key=eff?.dest?.trim()||'_none';
    if(!map[key]) map[key]={dest:eff?.dest||L('noDest'),e:0,days:0};
    map[key].e+=parseFloat(d.expense)||0;
    if(parseFloat(d.expense)>0) map[key].days++;
  });
  return Object.values(map).filter(x=>x.e>0).sort((a,b)=>b.e-a.e);
}
// Dest colors — cycles through a palette
const DEST_COLORS=['#2563EB','#059669','#D97706','#7C3AED','#DC2626','#0EA5E9','#65A30D'];
function destColor(i){return DEST_COLORS[i%DEST_COLORS.length];}
// Get segment for a day index (raw, from segments array)
function segForDay(t, idx) {
  if(!t.segments) return null;
  return t.segments.find(s=>idx>=s.fromIdx&&idx<=s.toIdx)||null;
}
// Effective dest for a day: just the segment (no per-day override anymore)
function effectiveSeg(t, idx) {
  return segForDay(t,idx);
}
function segIdx(t, idx) {
  const seg=segForDay(t,idx); if(!seg) return -1;
  return t.segments.indexOf(seg);
}
function uniqDestCount(t) {
  const dests=new Set();
  (t.segments||[]).forEach(s=>{ if(s.dest?.trim()) dests.add(s.dest.trim()); });
  (t.days||[]).forEach(d=>{ if(d.dayDest?.trim()) dests.add(d.dayDest.trim()); });
  return dests.size;
}

let _acTimer=null, _acInput=null, _acCallback=null;

function showCityDrop(input, callback) {
  _acInput=input; _acCallback=callback;
  input.addEventListener('input', onCityInput);
  input.addEventListener('blur', ()=>setTimeout(hideCityDrop,150));
  input.addEventListener('keydown', onCityKeydown);

function hideCityDrop() {
  const d=document.getElementById('city-drop');
  d.style.display='none'; d.innerHTML='';
}
function onCityInput(e) {
  clearTimeout(_acTimer);
  const q=e.target.value.trim();
  if(q.length<2){hideCityDrop();return;}
  _acTimer=setTimeout(()=>doSearch(q, e.target),220);
}
function doSearch(q, inputEl) {
  const lq=q.toLowerCase();
  // Local search first
  const local=CITIES_LOCAL.filter(c=>
    c.name.toLowerCase().startsWith(lq)||
    c.name.toLowerCase().includes(lq)
  ).slice(0,6);
  renderDrop(local, inputEl);
  // Also fetch from API for better results
  fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=8&language=es&format=json`)
    .then(r=>r.json()).then(d=>{
      const api=(d.results||[]).map(x=>({name:x.name,country:x.country||'',admin:x.admin1||'',lat:x.latitude,lon:x.longitude}));
      // Merge: API results first, then local ones not already covered
      const names=new Set(api.map(x=>x.name.toLowerCase()));
      const merged=[...api,...local.filter(x=>!names.has(x.name.toLowerCase()))].slice(0,6);
      renderDrop(merged, inputEl);
    }).catch(()=>{});
}
function renderDrop(cities, inputEl) {
  const drop=document.getElementById('city-drop');
  if(!cities.length){drop.style.display='none';return;}
  const rect=inputEl.getBoundingClientRect();
  drop.style.display='block';
  drop.style.top=(rect.bottom+window.scrollY+4)+'px';
  drop.style.left=rect.left+'px';
  drop.style.width=rect.width+'px';
  drop.innerHTML=cities.map((c,i)=>`
    <div class="city-item" onmousedown="pickFromDrop(${i})" data-idx="${i}">
      <span class="city-name">📍 ${esc(c.name)}</span>
      <span class="city-sub">${esc([c.admin,c.country].filter(Boolean).join(', '))}</span>
    </div>`).join('');
  drop._cities=cities;
}
function pickFromDrop(i) {
  const drop=document.getElementById('city-drop');
  const city=drop._cities?.[i]; if(!city) return;
  hideCityDrop();
  if(_acCallback) _acCallback(city);
}
let _dropIdx=-1;
function onCityKeydown(e) {
  const drop=document.getElementById('city-drop');
  if(drop.style.display==='none') return;
  const items=drop.querySelectorAll('.city-item');
  if(e.key==='ArrowDown'){e.preventDefault();_dropIdx=Math.min(_dropIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('hover',i===_dropIdx));}
  else if(e.key==='ArrowUp'){e.preventDefault();_dropIdx=Math.max(_dropIdx-1,0);items.forEach((el,i)=>el.classList.toggle('hover',i===_dropIdx));}
  else if(e.key==='Enter'&&_dropIdx>=0){e.preventDefault();pickFromDrop(_dropIdx);}
  else if(e.key==='Escape'){hideCityDrop();}
}

// ─── WEATHER ───
async function fetchW(idx) {
  const t=trip(); if(!t) return;
  const seg=effectiveSeg(t,idx);
  if(!seg?.dest?.trim()) return;
  const d=t.days[idx];
  const ds=d.date.split('T')[0]; // YYYY-MM-DD

  const key=`${seg.dest.toLowerCase()}|${ds}`;
  // Allow retry if errored — clear cache on manual tap
  if(S.wCache[key]&&!S.wCache[key].loading&&!S.wCache[key]._retry){render();return;}
  S.wCache[key]={loading:true}; render();

  try {
    // ── Step 1: get coordinates ──────────────────────────────────────────────
    let lat=parseFloat(seg.destLat), lon=parseFloat(seg.destLon);

    // Try CITIES_LOCAL first (instant, no network)
    if(!lat||!lon||isNaN(lat)||isNaN(lon)){
      const local=CITIES_LOCAL.find(ci=>
        ci.name.toLowerCase()===seg.dest.toLowerCase()||
        seg.dest.toLowerCase().includes(ci.name.toLowerCase())
      );
      if(local){ lat=local.lat; lon=local.lon; seg.destLat=String(lat); seg.destLon=String(lon); }
    }

    // Geocoding API as fallback
    if(!lat||!lon||isNaN(lat)||isNaN(lon)){
      try {
        const gr=await fetch(
          `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(seg.dest)}&count=1&language=es&format=json`,
          {signal:AbortSignal.timeout(6000)}
        );
        if(gr.ok){
          const gd=await gr.json();
          if(gd.results?.length){ lat=gd.results[0].latitude; lon=gd.results[0].longitude; seg.destLat=String(lat); seg.destLon=String(lon); }
        }
      } catch(e){}
    }

    if(!lat||!lon||isNaN(lat)||isNaN(lon)){
      S.wCache[key]={error:true,noCoords:true,dest:seg.dest,date:ds}; render(); return;
    }

    // ── Step 2: decide API by date (string comparison, no timezone issues) ──
    const todayStr=new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD local
    const [ty,tm,td]=todayStr.split('-').map(Number);
    const [dy,dm,dd]=ds.split('-').map(Number);
    const todayNum=ty*10000+tm*100+td;
    const dayNum  =dy*10000+dm*100+dd;
    // Rough diff in days
    const diffDays=Math.round((new Date(dy,dm-1,dd)-new Date(ty,tm-1,td))/86400000);

    let url='', isFuture=false, isTooFar=false;

    if(diffDays < 0){
      // Past — archive
      url=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&start_date=${ds}&end_date=${ds}`;
    } else if(diffDays <= 15){
      // Next 16 days — forecast
      url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&forecast_days=16`;
      isFuture=true;
    } else {
      // Too far in the future — no real forecast possible
      S.wCache[key]={error:true,tooFar:true,diffDays,dest:seg.dest,date:ds}; render(); return;
    }

    const wr=await fetch(url, {signal:AbortSignal.timeout(8000)});
    if(!wr.ok) throw new Error('HTTP '+wr.status);
    const wd=await wr.json();

    // For forecast: find the index matching our date in the returned array
    let tMax, tMin, code;
    if(isFuture && Array.isArray(wd.daily?.time)){
      const idx2=wd.daily.time.indexOf(ds);
      if(idx2<0){ S.wCache[key]={error:true,tooFar:true,diffDays,dest:seg.dest,date:ds}; render(); return; }
      tMax=wd.daily.temperature_2m_max[idx2];
      tMin=wd.daily.temperature_2m_min[idx2];
      code=wd.daily.weathercode?.[idx2]??0;
    } else {
      if(!wd.daily?.temperature_2m_max?.length){ S.wCache[key]={error:true,dest:seg.dest,date:ds}; render(); return; }
      tMax=wd.daily.temperature_2m_max[0];
      tMin=wd.daily.temperature_2m_min[0];
      code=wd.daily.weathercode?.[0]??0;
    }

    if(tMax==null||tMin==null){ S.wCache[key]={error:true,dest:seg.dest,date:ds}; render(); return; }

    S.wCache[key]={ emoji:wmoEmoji(code), max:Math.round(tMax), min:Math.round(tMin) };

  } catch(e){
    S.wCache[key]={error:true,dest:seg.dest,date:ds};
  }
  render();
}

function retryW(idx){
  const t=trip(); if(!t) return;
  const seg=effectiveSeg(t,idx); if(!seg?.dest?.trim()) return;
  const ds=t.days[idx]?.date?.split('T')[0]; if(!ds) return;
  const key=`${seg.dest.toLowerCase()}|${ds}`;
  if(S.wCache[key]) S.wCache[key]._retry=true;
  fetchW(idx);

function createTrip(name,start,end) {
  if(!name||!start||!end){toast(L('toastFields'));return;}
  if(new Date(end)<new Date(start)){toast(L('toastDate'));return;}
  const t={id:Date.now(),name,startDate:start,endDate:end,days:mkDays(start,end),segments:[],currency:'USD'};
  S.trips.push(t); S.tid=t.id; S.sheet=null; S.scr='trip'; S.tab='cal'; S.calOffset=0;
  save(); render();
}
function editTrip(name,start,end) {
  if(!name||!start||!end){toast(L('toastFields'));return;}
  if(new Date(end+'T12:00')<new Date(start+'T12:00')){toast(L('toastDate'));return;}
  const t=trip(); if(!t) return;

  // ── Save old days indexed by date string ──────────────────────────────────
  const oldDays=t.days||[];
  const oldByDate={};
  oldDays.forEach(d=>{ oldByDate[d.date.split('T')[0]]=d; });

  // ── Save old dates array so we can map segment indices → dates ────────────
  const oldDateStrs=oldDays.map(d=>d.date.split('T')[0]);

  // ── Build new days list (don't assign yet) ──────────────────────────────
  const newDays=mkDays(start,end);
  const newDateStrs=newDays.map(d=>d.date.split('T')[0]);

  // ── Safety check BEFORE modifying anything ───────────────────────────────
  const hasOverlap = newDateStrs.some(ds => oldByDate[ds]);
  if(!hasOverlap && oldDays.length > 0) {
    const msg = S.lang==='en'
      ? "The new dates don't overlap with the old ones. All day data will be lost. Continue?"
      : 'Las fechas nuevas no coinciden con las anteriores. Se perderán todos los datos de los días. ¿Continuás?';
    if(!confirm(msg)) return;
  }

  // ── Assign new days, preserving data for dates that still exist ───────────
  t.days=newDays.map(nd=>{
    const ds=nd.date.split('T')[0];
    return oldByDate[ds] ? {...oldByDate[ds], date:nd.date} : nd;
  });

  // ── Remap segments: idx → old date → new idx ─────────────────────────────
  t.segments=(t.segments||[]).map(seg=>{
    const fromDate=oldDateStrs[seg.fromIdx];
    const toDate  =oldDateStrs[seg.toIdx];
    if(!fromDate||!toDate) return null;
    const newFrom=newDateStrs.indexOf(fromDate);
    const newTo  =newDateStrs.indexOf(toDate);
    if(newFrom<0 && newTo<0) return null;
    // Extend segment to cover new days at start/end if trip was expanded
    return {...seg,
      fromIdx: newFrom>=0 ? newFrom : 0,
      toIdx:   newTo>=0   ? newTo   : t.days.length-1,
    };
  }).filter(Boolean);

  t.name=name; t.startDate=start; t.endDate=end;
  S.sheet=null; save(); render();
}

// ─── ITEMS PER DAY helper ──────────────────────────────────────────────────
function itemsForDay(t, dayIdx) {
  // Returns {total, items[]} from t.items[] matching the day's date
  if (!Array.isArray(t.items) || !t.days[dayIdx]) return {total:0, items:[]};
  const dayDate = t.days[dayIdx].date.split('T')[0]; // YYYY-MM-DD
  const matched = t.items.filter(itm => itm.date === dayDate);
  const total = matched.reduce((s, itm) => s + (parseFloat(itm.price)||0), 0);
  return {total, items: matched};
}

function saveSeg(city, fromDate, toDate, hotel, flight, mapUrl) {
  const t=trip(); if(!t) return;
  if(!city?.name){toast(L('toastCity'));return;}
  if(!fromDate||!toDate){toast(L('toastDates'));return;}

  // Use T12:00 to avoid UTC parse giving previous day in negative-offset timezones
  // Always parse with T12:00 to avoid UTC off-by-one in negative-offset timezones
  const tripStart=new Date(t.startDate.split('T')[0]+'T12:00'); tripStart.setHours(0,0,0,0);
  const tripEnd=new Date(t.endDate.split('T')[0]+'T12:00'); tripEnd.setHours(0,0,0,0);
  const from=new Date(fromDate.split('T')[0]+'T12:00'); from.setHours(0,0,0,0);
  const to=new Date(toDate.split('T')[0]+'T12:00'); to.setHours(0,0,0,0);

  if(from>to){toast(L('toastFromTo'));return;}
  if(from<tripStart||to>tripEnd){toast(L('toastRange'));return;}

  // Convert dates to day indices
  const fromIdx=Math.round((from-tripStart)/864e5);
  const toIdx=Math.round((to-tripStart)/864e5);

  const seg={dest:city.name,destFull:[city.name,city.admin,city.country].filter(Boolean).join(', '),destLat:String(city.lat||''),destLon:String(city.lon||''),hotel:hotel||'',flight:flight||'',mapUrl:mapUrl||'',fromIdx,toIdx};

  if(S.editSegIdx!==null) {
    t.segments[S.editSegIdx]=seg;
  } else {
    t.segments.push(seg);
  }
  // Sort and merge adjacent same-dest segments
  t.segments.sort((a,b)=>a.fromIdx-b.fromIdx);
  mergeAdjacentSegs(t);
  S.sheet=null; save(); render();
}

function delSeg(i) {
  const t=trip(); if(!t) return;
  t.segments.splice(i,1);
  S.sheet=null; save(); render();
}

// ─── CALENDAR ───
function buildCal() {
  const t=trip(); if(!t) return null;
  const base=new Date(t.startDate);
  const totalM=base.getMonth()+S.calOffset;
  const y=base.getFullYear()+Math.floor(totalM/12);
  const m=((totalM%12)+12)%12;
  const label=new Date(y,m,1).toLocaleDateString(loc(),{month:'long',year:'numeric'});
  const daysInMonth=new Date(y,m+1,0).getDate();
  const firstDow=new Date(y,m,1).getDay();
  // String comparison avoids all timezone issues (same approach as range picker)
  const tripStartStr=t.startDate.split('T')[0];
  const tripEndStr=t.endDate.split('T')[0];
  const lookup={};
  t.days.forEach((d,i)=>{
    const ds=d.date.split('T')[0]; // "YYYY-MM-DD"
    const [dy,dm,dday]=ds.split('-').map(Number);
    if(dy===y&&(dm-1)===m){
      const rawSeg=segForDay(t,i);
      const rawSi=rawSeg?t.segments.indexOf(rawSeg):-1;
      lookup[dday]={idx:i,seg:effectiveSeg(t,i),rawSi};
    }
  });
  const weeks=[]; let week=new Array(firstDow).fill(null);
  for(let day=1;day<=daysInMonth;day++){
    const ds2=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const inTrip=ds2>=tripStartStr&&ds2<=tripEndStr;
    week.push({day,info:lookup[day]||null,inTrip});
    if(week.length===7){weeks.push(week);week=[];}
  }
  if(week.length){while(week.length<7)week.push(null);weeks.push(week);}
  return{label,weeks,y,m};
}
