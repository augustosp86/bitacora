    <button class="tab ${S.tab==='search'?'on':''}" onclick="S.tab='search';render()" style="position:relative"><span class="ti">🔍</span>${L('tabSearch')}${S.tab!=='search'?'<span style="position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--blue)"></span>':''}</button>
  </div>`;

  // ── TRIP NOTES (visible on cal + itin tabs) ──
  if(S.tab==='cal'||S.tab==='itin'){
    const notesOpen=!!S.notesOpen[t.id];
    h+=`<div class="trip-notes-card">
      <div class="trip-notes-hdr ${notesOpen?'open':''}" onclick="S.notesOpen[${t.id}]=!S.notesOpen[${t.id}];render()">
        <span style="font-size:15px">📝</span>
        <span class="trip-notes-lbl">${L('tripNotesLbl')}</span>
        ${t.notes?.trim()?`<span style="font-size:10px;color:var(--blue);font-weight:600;background:var(--blue-bg);padding:2px 8px;border-radius:20px">${t.notes.trim().slice(0,22)}${t.notes.trim().length>22?'…':''}</span>`:''}
        <span class="trip-notes-chev">${notesOpen?'▲':'▼'}</span>
      </div>
      ${notesOpen?`<div class="trip-notes-body"><textarea class="trip-notes-ta" placeholder="${L('tripNotesPh')}" oninput="updTripNotes(${t.id},this.value)">${esc(t.notes||'')}</textarea></div>`:''}
    </div>`;
  }

  // ── CALENDAR ──
  if(S.tab==='cal') {
    const cal=buildCal();
    if(cal){
      h+='<div class="cal-wrap">';
      h+=`<div class="cal-nav"><button class="cal-nav-btn" onclick="S.calOffset--;render()">&#8249;</button><h3>${cal.label}</h3><button class="cal-nav-btn" onclick="S.calOffset++;render()">&#8250;</button></div>`;
      h+='<table class="cal-table"><thead><tr>';
      I18N[S.lang].calDays.forEach(d=>{h+=`<th class="cal-th">${d}</th>`;});
      h+='</tr></thead><tbody>';
      cal.weeks.forEach(week=>{
        h+='<tr>';
        week.forEach(cell=>{
          h+='<td class="cal-td">';
          if(!cell){h+='<span class="cday out"></span>';}
          else{
            const iT=isToday(new Date(cal.y,cal.m,cell.day));
            const eff=cell.info?.seg||null;   // already effectiveSeg from buildCal
            const hasDest=eff?.dest?.trim();
            const rawSi=cell.info?.rawSi??-1;
            let cls='cday'; let inlineStyle='';
            if(!cell.inTrip){ cls+=' out'; }
            else if(hasDest){
              cls+=' trip';
              // Per-segment saturated pastel using DEST_COLORS
              const col=rawSi>=0?destColor(rawSi):'#2563EB';
              inlineStyle=`background:${col}26;color:${col};border:1.5px solid ${col}55;`;
            } else { cls+=' trip'; }
            if(iT&&cell.inTrip) cls+=' now';
            const click=cell.info
              ? `onclick="S.didx=${cell.info.idx};S.scr='day';render()"`
              : '';
            const cityLabel=hasDest?`<span class="cday-lbl">${esc(eff.dest.slice(0,6))}</span>`:'';
            h+=`<span class="${cls}" style="${inlineStyle}" ${click}><span class="cday-num">${cell.day}</span>${cityLabel}</span>`;
          }
          h+='</td>';
        });
        h+='</tr>';
      });
      h+='</tbody></table>';
      h+=`<div class="cal-legend"><div class="cal-li"><div class="cal-sw" style="background:#2563EB26;border:1.5px solid #2563EB55"></div>${L('legDest')}</div><div class="cal-li"><div class="cal-sw" style="background:var(--bg2)"></div>${L('legNone')}</div><div class="cal-li"><div class="cal-sw" style="box-shadow:inset 0 0 0 2px var(--ink)"></div>${L('legToday')}</div></div>`;
      h+=`<button class="add-seg-btn" onclick="openNewSeg()" style="margin-top:8px">${L('addDestBtn')}</button>`;
      h+='</div>';

      // ── PACKING CHECKLIST below calendar ──
      if(!S._readOnly){
        ensurePack(t);
        const packDone=t.packList.filter(x=>x.done).length;
        const packTotal=t.packList.length;
        const packOpen=!!S.notesOpen['pack_'+t.id];
        h+=`<div class="pack-card">
          <div class="pack-hdr ${packOpen?'open':''}" onclick="S.notesOpen['pack_${t.id}']=!S.notesOpen['pack_${t.id}'];render()">
            <span style="font-size:15px">🎒</span>
            <span class="pack-lbl">${S.lang==='en'?'Packing checklist':'Checklist de equipaje'}</span>
            <span id="pack-prog-${t.id}" class="pack-progress">${packDone>0?packDone+'/'+packTotal+' ✓':''}</span>
            <span class="pack-chev">▼</span>
          </div>
          ${packOpen?`<div class="pack-body">
            <div id="pack-list-${t.id}"></div>
            <div class="pack-add-row">
              <input class="pack-inp" id="pack-inp-${t.id}" type="text" placeholder="${S.lang==='en'?'Add item...':'Agregar ítem...'}"
                onkeydown="if(event.key==='Enter')addPackItem(${t.id})"/>
              <button class="pack-add-btn" onclick="addPackItem(${t.id})">＋</button>
            </div>
          </div>`:''}
        </div>`;
        if(packOpen) setTimeout(()=>renderPackSection(t.id),30);
      }
    }
  }

  // ── ITIN ──
  if(S.tab==='itin') {
    // ── Trip Summary Card ──
    const segs=t.segments||[];
    const nDests=new Set(segs.map(s=>s.dest)).size;
    h+=`<div class="trip-sum">`;
    const is2=itemStats(t);
    const totalShow=is2.spent>0?is2.spent:bs.e;
    h+=`<div class="trip-sum-header"><div><div class="trip-sum-title">${esc(t.name)}</div><div class="trip-sum-meta">${t.days.length} días${nDests?` · ${nDests} ${nDests>1?L('destinos_pl'):L('destinos')}`:''}${totalShow>0?` · ${sym} ${totalShow.toLocaleString(loc(),{maximumFractionDigits:0})} ${L('spent')}`:''}</div></div>${totalShow>0?`<div class="trip-sum-total"><div class="trip-sum-total-v">${sym} ${totalShow.toLocaleString(loc(),{maximumFractionDigits:0})}</div><div class="trip-sum-total-l">${L('total')}</div></div>`:''}</div>`;
    // Sort segments by fromIdx
    const sortedSegs=[...segs].sort((a,b)=>a.fromIdx-b.fromIdx);
    if(sortedSegs.length){
      const byDest=budStatsByDest(t);
      const destsOpen=!!S.notesOpen['dests_'+t.id];
      // Toggle header
      h+=`<div class="dest-list-toggle" onclick="S.notesOpen['dests_${t.id}']=!S.notesOpen['dests_${t.id}'];render()">
        <div class="dest-list-toggle-label">${nDests} ${nDests>1?L('destinos_pl'):L('destinos')}</div>
        <div class="dest-list-toggle-chev ${destsOpen?'open':''}">▼</div>
      </div>`;
      // Collapsible list
      if(destsOpen){
        h+=`<div class="dest-list">`;
        sortedSegs.forEach((seg,si)=>{
          const origSi=t.segments.indexOf(seg);
          const destE=byDest[origSi]?.e||0;
          const nDays=seg.toIdx-seg.fromIdx+1;
          h+=`<div class="dest-item" onclick="openEditSeg(${origSi})" style="cursor:pointer">
            <div class="dest-item-dot" style="background:${destColor(origSi)}"></div>
            <div class="dest-item-info">
              <div class="dest-item-name">${esc(seg.dest)}</div>
              <div class="dest-item-dates">${fmtShort(t.days[seg.fromIdx]?.date)} – ${fmtShort(t.days[seg.toIdx]?.date)} · ${nDays} día${nDays!==1?'s':''}${seg.hotel?' · 🏨 '+esc(seg.hotel.split(' ').slice(0,2).join(' ')):''}${seg.flight?' · ✈ '+esc(seg.flight):''}</div>
            </div>
            <div style="font-size:10px;color:var(--blue);font-weight:700;flex-shrink:0">${destE>0?sym+' '+destE.toLocaleString(loc(),{maximumFractionDigits:0})+' · ':''} ✏️</div>
          </div>`;
        });
        h+=`</div>`;
      }
    } else {
      h+=`<div style="font-size:12px;color:var(--ink3);margin-top:4px">${L('noDestHint')}</div>`;
    }
    h+=`</div>`;
    // ── Add range button at TOP, always visible ──
    h+=`<button class="add-seg-btn" onclick="openNewSeg()" style="margin:4px 18px 10px;width:calc(100% - 36px)">${L('addDestBtn')}</button>`;

    // ── Chronological timeline: build groups in day order ──
    // A "group" is a consecutive run of days sharing the same effective dest key
    const groups=[];
    let curGroup=null;
    t.days.forEach((d,i)=>{
      const eff=effectiveSeg(t,i);
      const rawSeg=segForDay(t,i);
      const rawSi=rawSeg?t.segments.indexOf(rawSeg):-1;
      // Key: seg uses 'seg:'+si, none uses 'none'
      const key=rawSi>=0?`seg:${rawSi}`:'none';
      if(!curGroup||curGroup.key!==key){
        curGroup={key,eff,rawSi,days:[i]};
        groups.push(curGroup);
      } else {
        curGroup.days.push(i);
      }
    });

    h+='<div class="tl-wrap">';
    groups.forEach(grp=>{
      const {eff,rawSi,days}=grp;
      const hasDest=eff?.dest?.trim();
      const color=rawSi>=0?destColor(rawSi):'var(--ink3)';
      const bgColor=rawSi>=0?destColor(rawSi)+'20':'var(--bg2)';
      const bdColor=rawSi>=0?destColor(rawSi)+'55':'var(--line2)';

      if(hasDest){
        // Grouped header
        const firstDay=t.days[days[0]], lastDay=t.days[days[days.length-1]];
        const rangeStr=days.length>1?`${fmtShort(firstDay.date)} – ${fmtShort(lastDay.date)}`:`${fmtShort(firstDay.date)}`;
        h+=`<div class="tl-group">`;
        h+=`<div class="tl-group-hdr" style="background:${bgColor};border-color:${bdColor}">`;
        h+=`<div class="tl-group-hdr-dot" style="background:${color}"></div>`;
        h+=`<div class="tl-group-hdr-name" style="color:${color}">📍 ${esc(eff.dest)}</div>`;
        h+=`<div class="tl-group-hdr-range" style="color:${color}">${rangeStr}</div>`;
        if(rawSi>=0){
          h+=`<button class="tl-group-hdr-edit" style="color:${color}" onclick="openEditSeg(${rawSi})">✏️</button>`;
        }
        h+=`</div><div class="tl-group-days" style="border-color:${bdColor}">`;
        days.forEach(i=>{
          const d=t.days[i]; const iT=isToday(d.date);
          const dateStr=new Date(d.date.split('T')[0]+'T12:00').toLocaleDateString(loc(),{day:'numeric',month:'short'}).toUpperCase();
          const dow=new Date(d.date.split('T')[0]+'T12:00').toLocaleDateString(loc(),{weekday:'short'});
          const ev=itemsForDay(t,i).total||(parseFloat(d.expense)||0);
          let chips='';
          // Flights — all of them
          const allFlights=[...(d.flights||[])].filter(Boolean);
          if(!allFlights.length&&d.flight) allFlights.push(d.flight);
          const segFlight=eff?.flight||'';
          if(!allFlights.length&&segFlight&&i===days[0]) allFlights.push(segFlight);
          allFlights.forEach(fl=>{ chips+=`<span class="tl-chip flight">✈ ${esc(fl)}</span>`; });
          // Hotels — all of them
          const allHotels=[...(d.hotels||[])].filter(Boolean);
          if(!allHotels.length&&d.hotel) allHotels.push(d.hotel);
          if(!allHotels.length&&eff?.hotel) allHotels.push(eff.hotel);
          allHotels.forEach(ht=>{ chips+=`<span class="tl-chip hotel">🏨 ${esc(ht.split(' ').slice(0,3).join(' '))}</span>`; });
          // Activities
          const acts=d.activities||[];
          if(acts.length<=3){
            acts.forEach(a=>{ chips+=`<span class="tl-chip activity">${a.icon} ${esc(a.name.slice(0,16))}${a.name.length>16?'…':''}</span>`; });
          } else {
            acts.slice(0,2).forEach(a=>{ chips+=`<span class="tl-chip activity">${a.icon} ${esc(a.name.slice(0,14))}${a.name.length>14?'…':''}</span>`; });
            chips+=`<span class="tl-chip multi">+${acts.length-2}</span>`;
          }
          // Expense
          if(ev>0){chips+=`<span class="tl-chip expense">💰 ${sym} ${ev.toLocaleString(loc(),{maximumFractionDigits:0})}</span>`;}
          // Notes
          if(d.notes?.trim()) chips+=`<span class="tl-chip note">📝 ${esc(d.notes.slice(0,18))}${d.notes.length>18?'…':''}</span>`;
          const dayMapUrl=d.mapUrl||'';
          h+=`<div class="tl-day-row" onclick="S.didx=${i};S.scr='day';render()">
            <div class="tl-day-num ${iT?'today':''}">${i+1}</div>
            <div class="tl-day-info">
              <div class="tl-day-date">${dow.toUpperCase()} ${dateStr}${iT?` · ${L('today')}`:''}</div>
              ${chips?`<div class="tl-day-chips">${chips}</div>`:''}
            </div>
            ${dayMapUrl?`<a href="${esc(dayMapUrl)}" target="_blank" rel="noopener" class="tl-map-btn" onclick="event.stopPropagation()" title="${S.lang==='en'?'Open day map':'Abrir mapa del día'}">🗺️</a>`:''}
            <div class="day-chev">›</div>
          </div>`;
        });
        h+=`</div></div>`;
      } else {
        // Ungrouped days — plain rows
        h+=`<div class="tl-ungrouped">`;
        days.forEach(i=>{
          const d=t.days[i]; const iT=isToday(d.date);
          const dateStr=new Date(d.date.split('T')[0]+'T12:00').toLocaleDateString(loc(),{day:'numeric',month:'short'}).toUpperCase();
          const dow=new Date(d.date.split('T')[0]+'T12:00').toLocaleDateString(loc(),{weekday:'short'});
          const ev=itemsForDay(t,i).total||(parseFloat(d.expense)||0);
          let chips='';
          const uFlights=[...(d.flights||[])].filter(Boolean);
          if(!uFlights.length&&d.flight) uFlights.push(d.flight);
          uFlights.forEach(fl=>{ chips+=`<span class="tl-chip flight">✈ ${esc(fl)}</span>`; });
          const uHotels=[...(d.hotels||[])].filter(Boolean);
          if(!uHotels.length&&d.hotel) uHotels.push(d.hotel);
          uHotels.forEach(ht=>{ chips+=`<span class="tl-chip hotel">🏨 ${esc(ht.split(' ').slice(0,3).join(' '))}</span>`; });
          const uActs=d.activities||[];
          if(uActs.length<=3){ uActs.forEach(a=>{ chips+=`<span class="tl-chip activity">${a.icon} ${esc(a.name.slice(0,16))}${a.name.length>16?'…':''}</span>`; }); }
          else { uActs.slice(0,2).forEach(a=>{ chips+=`<span class="tl-chip activity">${a.icon} ${esc(a.name.slice(0,14))}${a.name.length>14?'…':''}</span>`; }); chips+=`<span class="tl-chip multi">+${uActs.length-2}</span>`; }
          if(ev>0){chips+=`<span class="tl-chip expense">💰 ${sym} ${ev.toLocaleString(loc(),{maximumFractionDigits:0})}</span>`;}
          if(d.notes?.trim()) chips+=`<span class="tl-chip note">📝 ${esc(d.notes.slice(0,18))}${d.notes.length>18?'…':''}</span>`;
          const plainMapUrl=d.mapUrl||'';
          h+=`<div class="tl-plain-row" onclick="S.didx=${i};S.scr='day';render()">
            <div class="tl-day-num ${iT?'today':''}">${i+1}</div>
            <div class="tl-day-info">
              <div class="tl-day-date" style="color:var(--ink3)">${dow.toUpperCase()} ${dateStr}${iT?` · ${L('today')}`:''}</div>
              ${chips?`<div class="tl-day-chips">${chips}</div>`:`<div style="font-size:10px;color:var(--ink3);margin-top:2px">${L('noDestAssigned')}</div>`}
            </div>
            ${plainMapUrl?`<a href="${esc(plainMapUrl)}" target="_blank" rel="noopener" class="tl-map-btn" onclick="event.stopPropagation()" title="${S.lang==='en'?'Open day map':'Abrir mapa del día'}">🗺️</a>`:''}
            <div class="day-chev">›</div>
          </div>`;
        });
        h+=`</div>`;
      }
    });
    h+='</div>';

    // ── PACKING CHECKLIST (collapsible, in itin tab) ──────────────────────
    ensurePack(t);
    const packDone=t.packList.filter(x=>x.done).length;
    const packTotal=t.packList.length;
    const packOpen=!!S.notesOpen['pack_'+t.id];
    h+=`<div class="pack-card">
      <div class="pack-hdr ${packOpen?'open':''}" onclick="S.notesOpen['pack_${t.id}']=!S.notesOpen['pack_${t.id}'];render()">
        <span style="font-size:15px">🎒</span>
        <span class="pack-lbl">${S.lang==='en'?'Packing checklist':'Checklist de equipaje'}</span>
        <span id="pack-prog-${t.id}" class="pack-progress">${packDone>0?packDone+'/'+packTotal+' ✓':''}</span>
        <span class="pack-chev">▼</span>
      </div>
      ${packOpen?`<div class="pack-body">
        <div id="pack-list-${t.id}"></div>
        <div class="pack-add-row">
          <input class="pack-inp" id="pack-inp-${t.id}" type="text" placeholder="${S.lang==='en'?'Add item...':'Agregar ítem...'}"
            onkeydown="if(event.key==='Enter')addPackItem(${t.id})"/>
          <button class="pack-add-btn" onclick="addPackItem(${t.id})">＋</button>
        </div>
      </div>`:''}
    </div>`;
    if(packOpen) setTimeout(()=>renderPackSection(t.id),30);
  }

  // ── BUDGET ──
  if(S.tab==='budget') {
    const iSt=itemStats(t);
    const over=iSt.budget>0&&iSt.rem<0;
    const pctTotal=iSt.budget>0?Math.min(100,Math.round(iSt.spent/iSt.budget*100)):0;

    h+=`<div style="padding:0 18px 24px">`;

    // ── Presupuesto total ─────────────────────────────────────────────────────
    h+=`<div style="background:var(--white);border-radius:var(--r3);padding:22px 20px;box-shadow:var(--sh);margin-bottom:16px">`;
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">`;
    h+=`<div style="font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1.2px">${S.lang==='en'?'Total trip budget':'Presupuesto total del viaje'}</div>`;
    h+=`<select class="cur-sel" onchange="updCur(${t.id},this.value)">${['USD','EUR','ARS','BRL','CLP','UYU'].map(c=>`<option ${t.currency===c?'selected':''}>${c}</option>`).join('')}</select>`;
    h+=`</div>`;
    h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:14px">`;
    h+=`<div style="font-family:var(--fd);font-size:32px;font-weight:600;color:var(--ink)">${sym}</div>`;
    h+=`<input type="number" value="${esc(String(t.totalBudget||''))}" placeholder="0" oninput="updTripBudget(this.value)"
      style="font-family:var(--fd);font-size:32px;font-weight:600;background:transparent;border:none;outline:none;flex:1;min-width:0;color:var(--ink);-webkit-appearance:none;text-align:right"/>`;
    h+=`</div>`;
    if(iSt.budget>0){
      h+=`<div style="height:8px;background:var(--bg2);border-radius:999px;overflow:hidden;margin-bottom:8px">`;
      h+=`<div style="height:100%;width:${pctTotal}%;background:${over?'var(--red)':'linear-gradient(90deg,var(--green),#34d399)'};transition:width .6s ease"></div>`;
      h+=`</div>`;
      h+=`<div style="display:flex;justify-content:space-between;font-size:12px">`;
      h+=`<span style="color:${over?'var(--red)':'var(--green)'};font-weight:600">${pctTotal}% ${S.lang==='en'?'used':'usado'}</span>`;
      h+=`<span style="color:var(--ink3)">${sym} ${iSt.spent.toLocaleString(loc())} ${S.lang==='en'?'of':'de'} ${sym} ${iSt.budget.toLocaleString(loc())}</span>`;
      h+=`</div>`;
    } else {
      h+=`<div style="color:var(--ink3);font-size:12px">💡 ${S.lang==='en'?'Enter your total budget above':'Ingresá el presupuesto total arriba'}</div>`;
    }
    h+=`</div>`;

    if(over) h+=`<div class="bud-alert">⚠️ ${L('budgetOver')} — ${sym} ${Math.abs(iSt.rem).toLocaleString(loc(),{maximumFractionDigits:0})} extra</div>`;

    h+=`</div>`;

    // ── Items section ─────────────────────────────────────────────────────────
    h+=`<div class="items-sec">`;
    h+=`<div class="items-hdr"><div class="items-lbl">${L('itemsTitle')}</div><button class="add-item-btn" onclick="openNewItem()">${L('addItem')}</button></div>`;
    const items=t.items||[];
    if(items.length){
      const byDate={};
      const noDate=[];
      items.forEach((it,ii)=>{
        if(it.date){ if(!byDate[it.date]) byDate[it.date]=[]; byDate[it.date].push({it,ii}); }
        else noDate.push({it,ii});
      });
      const sortedDates=Object.keys(byDate).sort();
      sortedDates.forEach(dateKey=>{
        const group=byDate[dateKey];
        const dayTotal=group.reduce((s,{it})=>s+(parseFloat(it.price)||0),0);
        const dayIdx=t.days.findIndex(d=>d.date.split('T')[0]===dateKey);
        const dayDest=dayIdx>=0?effectiveSeg(t,dayIdx)?.dest:'';
        const si=dayIdx>=0?segIdx(t,dayIdx):-1;
        const col=si>=0?destColor(si):'var(--ink3)';
        const dateLabel=new Date(dateKey+'T12:00').toLocaleDateString(loc(),{day:'numeric',month:'short'});
        const destLabel=dayDest?' · '+esc(dayDest):'';
        h+=`<div class="items-day-hdr" style="border-left-color:${col}">
          <div class="items-day-label"><div class="items-day-dot" style="background:${col}"></div><span>${dateLabel}${destLabel}</span></div>
          <div class="items-day-total" style="color:${col}">${sym} ${dayTotal.toLocaleString(loc(),{maximumFractionDigits:0})}</div>
        </div>`;
        group.forEach(({it,ii})=>{
          h+=`<div class="item-row">
            <div class="item-ico">${it.icon||icatIcon(it.category)}</div>
            <div class="item-info"><div class="item-name">${esc(it.name)}</div><div class="item-cat">${icatLabel(it.category)}</div></div>
            <div class="item-price">${sym} ${(parseFloat(it.price)||0).toLocaleString(loc(),{maximumFractionDigits:0})}</div>
            <div class="item-acts">
              <button class="item-btn e" onclick="openEditItem(${ii})">✏️</button>
              <button class="item-btn d" onclick="delItem(${ii})">🗑</button>
            </div>
          </div>`;
        });
      });
      if(noDate.length){
        h+=`<div class="items-day-hdr"><div class="items-day-label"><span style="color:var(--ink3)">${S.lang==='en'?'No date':'Sin fecha'}</span></div></div>`;

              <button class="item-btn e" onclick="openEditItem(${ii})">✏️</button>

            </div>
          </div>`;

      }
      h+=`<div style="display:flex;justify-content:space-between;padding:10px 4px;border-top:1.5px solid var(--line2);margin-top:4px"><div style="font-size:12px;font-weight:700;color:var(--ink2)">${L('total')}</div><div style="font-family:var(--fd);font-size:16px;font-weight:600">${sym} ${iSt.spent.toLocaleString(loc(),{maximumFractionDigits:0})}</div></div>`;

  }

  // ── MAP ──

    h+='<div class="map-wrap">';

    const destMap=new Map(); // key=destName, value={dest, destFull, lat, lon, color, days:[], hotels:Set, flights:Set, activities:[]}

      const eff=effectiveSeg(t,i);

        const si=segIdx(t,i);

// ─── GOOGLE CALENDAR HELPER ──────────────────────────────────────────────────
function gcalUrl(dayIdx, actName, actIcon) {
  const t = trip(); if(!t) return '#';
  const d = t.days[dayIdx]; if(!d) return '#';
  const eff = effectiveSeg(t, dayIdx);
  const dest = eff?.dest || '';
  const ds = d.date.split('T')[0]; // YYYY-MM-DD
  const dateStr = ds.replace(/-/g,''); // YYYYMMDD

  // If activity-specific, use activity name; otherwise use day summary
  let title, details;
  if(actName){
    title = actIcon + ' ' + actName + (dest ? ' — ' + dest : '');
    details = '';
    if(dest)   details += '📍 ' + dest + '\n';
    if(d.notes?.trim()) details += '📝 ' + d.notes.trim();
  } else {
    title = (S.lang==='en'?'Day ':'Día ') + (dayIdx+1) + (dest ? ' — ' + dest : '');
    details = '';
    const flights = (Array.isArray(d.flights)?d.flights:[]).filter(Boolean);
    if(flights.length) details += '✈ ' + flights.join(', ') + '\n';
    const hotels  = (Array.isArray(d.hotels)?d.hotels:[]).filter(Boolean);
    if(hotels.length)  details += '🏨 ' + hotels.join(', ') + '\n';
    const acts = (d.activities||[]);
    if(acts.length) details += '🎟️ ' + acts.map(a=>a.icon+' '+a.name).join(' · ') + '\n';
    if(d.notes?.trim()) details += '📝 ' + d.notes.trim();
  }

  // All-day event: end date must be day+1 in Google Calendar format
  const endDate = new Date(ds + 'T12:00');
  endDate.setDate(endDate.getDate() + 1);
  const endStr = endDate.toISOString().split('T')[0].replace(/-/g,'');

  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text:   title,
    dates:  dateStr + '/' + endStr,
    location: eff?.destFull || dest,
    details: details.trim(),
  });
  return 'https://calendar.google.com/calendar/r/eventedit?' + params.toString();
}

// ─── RENDER DAY ───
function rDay() {
  const t=trip(); if(!t) return '';
  const d=t.days[S.didx]; if(!d) return '';
  const i=S.didx;
  const rawSeg=segForDay(t,i);
  const eff=effectiveSeg(t,i);
  const dt=new Date(d.date.split('T')[0]+'T12:00').toLocaleDateString(loc(),{weekday:'long',day:'numeric',month:'long'});
  const iT=isToday(d.date);
  const ds=d.date.split('T')[0];
  const key=eff?.dest?`${eff.dest.toLowerCase()}|${ds}`:null;
  const w=key?S.wCache[key]:null;

  // Segment info (non-override, clean)
  const segIdx_v = rawSeg ? t.segments.indexOf(rawSeg) : -1;
  const segColor = segIdx_v >= 0 ? destColor(segIdx_v) : 'var(--blue)';

  let h=`<div class="dd-top"><div class="dd-tag">${iT?`📍 ${L('today')} · `:''}${L('dayOf')} ${i+1}</div><div class="dd-title">${dt}</div>`;
  if(eff?.dest){
    h+=`<div class="dd-dest-chip" style="background:${segColor}18;color:${segColor};border:1.5px solid ${segColor}44">📍 ${esc(eff.destFull||eff.dest)}</div> `;
    if(w&&!w.loading&&!w.error) h+=`<div class="w-chip">${w.emoji} ${w.max}° / ${w.min}°C</div>`;
    else if(w?.tooFar){
      const _de2=encodeURIComponent(eff?.dest||'');
      h+=`<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
        <div class="w-chip" style="color:var(--ink3)" title="${S.lang==='en'?'Too far to forecast':'Muy lejos para pronosticar'}">📅 ~${w.diffDays}d</div>
        <a href="https://www.google.com/search?q=clima+${_de2}" target="_blank" rel="noopener" class="wbtn" style="text-decoration:none;font-size:10px;padding:4px 8px">🌐 Google</a>

  // Destination — editable, updates the segment
  h+=`<div class="field">

  if(dest_name){
    const btnS='flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 8px;background:white;border:1.5px solid var(--blue-bd);border-radius:var(--r2);text-decoration:none;font-size:11px;font-weight:700;color:var(--blue)';

        <a href="${bookingSrc}" target="_blank" rel="noopener nofollow" style="${btnS}">🏨 ${S.lang==='en'?'Hotels':'Hoteles'}</a>
        <a href="${gygSrc}" target="_blank" rel="noopener nofollow" style="${btnS}">🎟️ ${S.lang==='en'?'Activities':'Actividades'}</a>

      </div>

  return h;

// onDayDestInput moved above clearDayDest
function clearDayDest(idx) {
  const t=trip(); if(!t) return;
  t.days[idx].dayDest=''; t.days[idx].dayDestLat=''; t.days[idx].dayDestLon=''; t.days[idx].dayDestFull='';
  save(); render();
}

// ── Category click: direct DOM update, no full render ──
function setCat(idx, key, btn) {
  const t=trip(); if(!t) return;
  t.days[idx].category=key;
  save();
  // Toggle button states in the same row
  const row=btn.closest('.cat-row');
  if(row) row.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('on',b.dataset.cat===key));
  // Update the expense input label with emoji
  const brow=btn.closest('.brow');
  if(brow){
    const lbl=brow.querySelector('.binp-w:last-child label');
    if(lbl) lbl.textContent=(CAT_EMOJI[key]||'💰')+' Gasto real';
    // Also update the chip in itin if visible — skip, too complex, just leave it for next render
  }
}

// ── Debounced day-dest input (avoids save spam while typing) ──
let _ddTimer=null;
function onDayDestInput(idx, val) {
  const t=trip(); if(!t) return;
  t.days[idx].dayDest=val;
  // Clear coords — they'll refill when user picks from dropdown
  t.days[idx].dayDestLat=''; t.days[idx].dayDestLon=''; t.days[idx].dayDestFull='';
  clearTimeout(_ddTimer); _ddTimer=setTimeout(()=>save(),600);
  // Show city dropdown (DOM-direct, no render)
  const inp=document.getElementById('day-dest-inp');
  if(inp&&val.length>=2) doSearch(val, inp);
  else hideCityDrop();
  _acCallback=(city)=>{
    t.days[idx].dayDest=city.name;
    t.days[idx].dayDestLat=String(city.lat||'');
    t.days[idx].dayDestLon=String(city.lon||'');
    t.days[idx].dayDestFull=[city.name,city.admin,city.country].filter(Boolean).join(', ');
    save(); render();
  };
}

// ─── EXPORT / SHARE ───
function buildExportHTML(t, forPrint) {
  const sym=t.currency||'USD';
  const iSt=itemStats(t);
  const fmtDate=str=>new Date(str).toLocaleDateString(loc(),{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const fmtShortLocal=str=>new Date(str).toLocaleDateString(loc(),{day:'numeric',month:'short'});
  let segs='';
  (t.segments||[]).sort((a,b)=>a.fromIdx-b.fromIdx).forEach(seg=>{
    segs+=`<div style="display:flex;align-items:baseline;gap:10px;padding:7px 0;border-bottom:1px solid #eee">
      <div style="font-size:20px">📍</div>
      <div><strong>${seg.dest}</strong><div style="font-size:12px;color:#666">${fmtShortLocal(t.days[seg.fromIdx]?.date)} → ${fmtShortLocal(t.days[seg.toIdx]?.date)}${seg.hotel?' · 🏨 '+seg.hotel:''}${seg.flight?' · ✈ '+seg.flight:''}</div></div>
    </div>`;
  });
  let daysHtml='';
  t.days.forEach((d,i)=>{
    const acts=(d.activities||[]).map(a=>`<span style="display:inline-block;margin:2px 4px 2px 0;padding:2px 8px;background:#f0f4ff;border-radius:20px;font-size:11px">${a.icon} ${a.name}</span>`).join('');
    const dayNote=d.notes?`<div style="font-size:12px;color:#555;margin-top:4px">📝 ${d.notes}</div>`:'';
    const dayHotel=d.hotel?`<div style="font-size:12px;color:#555;margin-top:2px">🏨 ${d.hotel}</div>`:'';
    const dayFlight=d.flight?`<div style="font-size:12px;color:#555;margin-top:2px">✈ ${d.flight}</div>`:'';
    const dayExp=parseFloat(d.expense)||0;
    daysHtml+=`<div style="padding:10px 0;border-bottom:1px solid #f0f0f0">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:28px;height:28px;border-radius:50%;background:#1A1714;color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${i+1}</div>
        <div style="font-size:13px;font-weight:600">${new Date(d.date.split('T')[0]+'T12:00').toLocaleDateString(loc(),{weekday:'short',day:'numeric',month:'short'}).toUpperCase()}</div>
        ${dayExp>0?`<div style="margin-left:auto;font-size:12px;font-weight:700;color:#059669">${sym} ${dayExp.toLocaleString(loc(),{maximumFractionDigits:0})}</div>`:''}
      </div>
      ${dayHotel}${dayFlight}${dayNote}
      ${acts?`<div style="margin-top:5px">${acts}</div>`:''}
    </div>`;
  });
  let items='';
  (t.items||[]).forEach(it=>{
    items+=`<tr>
      <td style="padding:5px 8px">${it.icon} ${it.name}</td>
      <td style="padding:5px 8px;color:#666">${icatLabel(it.category)}</td>
      <td style="padding:5px 8px;color:#666;font-size:11px">${it.date?new Date(it.date).toLocaleDateString(loc(),{day:'numeric',month:'short'}):''}</td>
      <td style="padding:5px 8px;text-align:right;font-weight:700">${sym} ${(parseFloat(it.price)||0).toLocaleString(loc(),{maximumFractionDigits:0})}</td>
    </tr>`;
  });
  const total=`${sym} ${iSt.spent.toLocaleString(loc(),{maximumFractionDigits:0})}`;
  const budget=iSt.budget>0?`${sym} ${iSt.budget.toLocaleString(loc(),{maximumFractionDigits:0})}`:'—';

  return `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>${t.name} · Bitacora</title>
  <style>
    body{font-family:system-ui,sans-serif;max-width:680px;margin:0 auto;padding:24px 16px;color:#1A1714;background:#fff}
    h1{font-size:26px;margin-bottom:4px}
    .sub{color:#888;font-size:13px;margin-bottom:24px}

function exportTripHTML(){

async function copyTripText(){
  const t=trip(); if(!t) return;
  const sym=t.currency||'USD';
  const iSt=itemStats(t);
  const segs=(t.segments||[]).sort((a,b)=>a.fromIdx-b.fromIdx);
  const NL='\n';
  const parts=[];
  parts.push('✈ '+t.name);
  const locFmt=loc();
  parts.push('📅 '+new Date(t.startDate+'T12:00').toLocaleDateString(locFmt,{day:'numeric',month:'long',year:'numeric'})+' → '+new Date(t.endDate+'T12:00').toLocaleDateString(locFmt,{day:'numeric',month:'long',year:'numeric'}));
  parts.push('⏱ '+t.days.length+' '+(S.lang==='en'?'days':'días'));
  if(segs.length){
    parts.push('');
    parts.push('📍 '+(S.lang==='en'?'DESTINATIONS':'DESTINOS'));
    segs.forEach(s=>{
      let line='  • '+s.dest;
      const fd=t.days[s.fromIdx]?.date,td=t.days[s.toIdx]?.date;
      if(fd&&td) line+=' ('+new Date(fd+'T12:00').toLocaleDateString(locFmt,{day:'numeric',month:'short'})+' → '+new Date(td+'T12:00').toLocaleDateString(locFmt,{day:'numeric',month:'short'})+')';
      if(s.hotel) line+=' · 🏨 '+s.hotel;
      if(s.flight) line+=' · ✈ '+s.flight;
      parts.push(line);
    });
  }
  if(t.items?.length){
    parts.push('');
    parts.push('💰 '+(S.lang==='en'?'EXPENSES':'GASTOS')+' ('+sym+')');
    t.items.forEach(it=>{ parts.push('  • '+it.icon+' '+it.name+': '+sym+' '+(parseFloat(it.price)||0).toLocaleString(loc(),{maximumFractionDigits:0})); });
    parts.push('  TOTAL: '+sym+' '+iSt.spent.toLocaleString(loc(),{maximumFractionDigits:0}));
  }
  parts.push('');
  parts.push('🗺 Creado con Bitacora');
  const txt=parts.join(NL);
  try {
    await navigator.clipboard.writeText(txt);
    toast('✓ ' + (S.lang==='en'?'Copied to clipboard!':'¡Copiado al portapapeles!'));
  } catch(e) {
    // Fallback for older browsers / sandboxes
    const el=document.createElement('textarea');
    el.value=txt; el.style.position='fixed'; el.style.opacity='0';
    document.body.appendChild(el); el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    toast('✓ ' + (S.lang==='en'?'Copied!':'¡Copiado!'));
  }
}


// ─── MAP EMBED URL HELPER ────────────────────────────────────────────────────
function getMapEmbedUrl(url) {
  if(!url) return null;
  try {
    // Google My Maps: maps/d/viewer or maps/d/u/0/viewer → embed
    const myMapsMatch = url.match(/maps\/d\/(?:u\/\d+\/)?(?:viewer|edit)\?.*mid=([^&]+)/);
    if(myMapsMatch) return 'https://www.google.com/maps/d/embed?mid=' + myMapsMatch[1];
    // Short My Maps: maps/d/MAPID (direct)
    const shortMatch = url.match(/maps\/d\/([a-zA-Z0-9_-]{20,})/);
    if(shortMatch) return 'https://www.google.com/maps/d/embed?mid=' + shortMatch[1];
    // Google Maps embed URL already
    if(url.includes('google.com/maps/embed')) return url;
    // Regular Maps URL — can't embed, open only
    return null;
  } catch(e) { return null; }
}

// ─── SEGMENT DAY STRIP PICKER ────────────────────────────────────────────────
function wireSegDayStrip() {
  const strip = document.getElementById('seg-day-strip');
  if (!strip) return;
  const t = trip(); if (!t) return;

  function render_strip() {
    const fromVal = document.getElementById('seg-from')?.value || '';
    const toVal   = document.getElementById('seg-to')?.value   || '';
    const prev    = document.getElementById('seg-date-prev');

    // Build day bubbles
    let html = '<div style="display:flex;flex-wrap:wrap;gap:5px">';
    t.days.forEach((d, i) => {
      const ds = d.date.split('T')[0];
      const isFrom = ds === fromVal;
      const isTo   = ds === toVal;
      // Find which segment owns this day (excluding the one being edited)
      const rawSeg = segForDay(t, i);
      const editIdx = S.editSegIdx;
      const ownedBySelf = editIdx !== null && t.segments[editIdx] && i >= t.segments[editIdx].fromIdx && i <= t.segments[editIdx].toIdx;
      const ownedByOther = rawSeg && !ownedBySelf;
      const otherSi = ownedByOther ? t.segments.indexOf(rawSeg) : -1;

      // Is in current selection range?
      const inRange = fromVal && toVal && ds >= fromVal && ds <= toVal;
      const inSelf  = fromVal && !toVal && ds === fromVal;

      const dayNum = i + 1;
      const [dy2,dm2,dd2]=ds.split('-').map(Number);
      const dateObj = new Date(dy2, dm2-1, dd2);
      const label = dateObj.toLocaleDateString(loc(), {day:'numeric',month:'short'});

      let bg, border, color, fw='500';
      if (isFrom || isTo) {
        bg = '#1A1714'; color = 'white'; border = '#1A1714'; fw = '800';
      } else if (inRange) {
        bg = '#BFDBFE'; color = '#1D4ED8'; border = '#3B82F6'; fw = '700';
      } else if (ownedByOther) {
        const col = destColor(otherSi);
        bg = col + '22'; color = col; border = col + '66';
      } else {
        bg = '#E8E4DD'; color = '#5C5650'; border = '#C8C0B8';
      }

      const cursor = ownedByOther ? 'default' : 'pointer';
      html += `<div onclick="segStripClick('${ds}')" style="cursor:${cursor};padding:6px 9px;border-radius:8px;background:${bg};color:${color};border:1.5px solid ${border};font-size:10px;font-weight:${fw};text-align:center;min-width:38px;transition:all .1s">
        <div style="font-size:11px;font-weight:700">${dayNum}</div>
        <div style="font-size:9px;opacity:.8">${label}</div>
      </div>`;
    });
    html += '</div>';
    strip.innerHTML = html;

    // Update preview
    if (prev) {
      if (fromVal && toVal) {
        const diff = t.days.findIndex(d => d.date.split('T')[0] === toVal) - t.days.findIndex(d => d.date.split('T')[0] === fromVal) + 1;
        const f = new Date(fromVal + 'T00:00').toLocaleDateString(loc(), {day:'numeric',month:'short'});
        const tv = new Date(toVal + 'T00:00').toLocaleDateString(loc(), {day:'numeric',month:'short'});
        prev.textContent = `${f} → ${tv} · ${diff} ${S.lang === 'en' ? 'days' : 'días'}`;
      } else if (fromVal) {
        prev.textContent = S.lang === 'en' ? '→ Now tap end date' : '→ Ahora tocá la fecha de fin';
      } else {
        prev.textContent = S.lang === 'en' ? 'Tap start day' : 'Tocá el día de inicio';
      }
    }
  }

  strip._renderFn = render_strip;
  render_strip();
}

function segStripClick(ds) {
  const fromEl = document.getElementById('seg-from');
  const toEl   = document.getElementById('seg-to');
  if (!fromEl || !toEl) return;
  const fv = fromEl.value, tv = toEl.value;
  if (!fv || (fv && tv)) {
    // Start fresh selection
    fromEl.value = ds; toEl.value = '';
  } else {
    // Have from, need to
    if (ds < fv) { toEl.value = fv; fromEl.value = ds; }
    else if (ds === fv) { toEl.value = ds; } // same day = 1-day range
    else { toEl.value = ds; }
  }
  const strip = document.getElementById('seg-day-strip');
  if (strip?._renderFn) strip._renderFn();
}

// ─── UPDATE SEGMENT DEST FROM DAY — smart split ─────────────────────────────
let _segDestTimer = null;
function updSegDest(dayIdx, val) {
  const t = trip(); if(!t) return;
  const rawSeg = segForDay(t, dayIdx);

  // No existing segment — just update the input, no split needed
  if(!rawSeg){
    clearTimeout(_segDestTimer);
    _segDestTimer = setTimeout(()=>{ save(); }, 600);
    return;
  }

  const newDest = val.trim();
  if(!newDest || newDest === rawSeg.dest) return; // nothing changed

  // ── Split logic ──────────────────────────────────────────────────────────
  const origIdx = t.segments.indexOf(rawSeg);
  if(origIdx < 0) return;
  t.segments.splice(origIdx, 1);

  const from = rawSeg.fromIdx;
  const to   = rawSeg.toIdx;

  if(dayIdx > from){
    t.segments.push({
      dest:rawSeg.dest, destFull:rawSeg.destFull||rawSeg.dest,
      destLat:rawSeg.destLat, destLon:rawSeg.destLon,
      hotel:rawSeg.hotel||'', flight:rawSeg.flight||'', mapUrl:rawSeg.mapUrl||'',
      fromIdx:from, toIdx:dayIdx-1,
    });
  }

  const local = CITIES_LOCAL.find(ci =>
    ci.name.toLowerCase() === newDest.toLowerCase() ||
    newDest.toLowerCase().includes(ci.name.toLowerCase())
  );
  t.segments.push({
    dest:newDest, destFull:newDest,
    destLat:local?String(local.lat):'', destLon:local?String(local.lon):'',
    hotel:'', flight:'', mapUrl:'',
    fromIdx:dayIdx, toIdx:dayIdx,
  });

  if(dayIdx < to){
    t.segments.push({
      dest:rawSeg.dest, destFull:rawSeg.destFull||rawSeg.dest,
      destLat:rawSeg.destLat, destLon:rawSeg.destLon,
      hotel:rawSeg.hotel||'', flight:rawSeg.flight||'', mapUrl:rawSeg.mapUrl||'',
      fromIdx:dayIdx+1, toIdx:to,
    });
  }

  t.segments.sort((a,b) => a.fromIdx - b.fromIdx);

  // ── Merge adjacent segments with same dest ───────────────────────────────
  mergeAdjacentSegs(t);

  // Save immediately but DON'T render() — let the autocomplete callback handle that
  clearTimeout(_segDestTimer);
  _segDestTimer = setTimeout(()=>{ save(); }, 300);
}

// ─── MERGE ADJACENT SAME-DEST SEGMENTS ──────────────────────────────────────
function mergeAdjacentSegs(t) {
  if(!t.segments || t.segments.length < 2) return;
  t.segments.sort((a,b) => a.fromIdx - b.fromIdx);
  let merged = true;
  while(merged) {
    merged = false;
    for(let i = 0; i < t.segments.length - 1; i++) {
      const a = t.segments[i];
      const b = t.segments[i+1];
      // Same dest AND contiguous (b starts exactly where a ends +1)
      if(a.dest.trim().toLowerCase() === b.dest.trim().toLowerCase() &&
         b.fromIdx === a.toIdx + 1) {
        // Merge b into a — keep a's hotel/flight if set, else use b's
        t.segments[i] = {
          ...a,
          toIdx: b.toIdx,
          hotel: a.hotel||b.hotel||'',
          flight: a.flight||b.flight||'',
          mapUrl: a.mapUrl||b.mapUrl||'',
          destFull: a.destFull||b.destFull||a.dest,
          destLat: a.destLat||b.destLat||'',
          destLon: a.destLon||b.destLon||'',
        };
        t.segments.splice(i+1, 1);
        merged = true;
        break;
      }
    }
  }
}

function onFromDate(fromId, toId, previewId) {
  const fromEl=document.getElementById(fromId);
  const toEl=document.getElementById(toId);
  if(!fromEl||!toEl) return;
  const fv=fromEl.value;
  if(!fv) return;
  // Update min of "to" field so end can't be before start
  toEl.min=fv;
  // Clear end date only if it's before the new start
  if(toEl.value && toEl.value<fv) { toEl.value=''; }
  updateDatePreview(fromId, toId, previewId);
}
function updateDatePreview(fromId, toId, previewId) {
  const fromEl=document.getElementById(fromId);
  const toEl=document.getElementById(toId);
  const prev=document.getElementById(previewId);
  if(!prev) return;
  const fv=fromEl?.value, tv=toEl?.value;
  if(!fv&&!tv){prev.style.display='none';return;}
  prev.style.display='flex';
  const fStr=fv?new Date(fv+'T12:00:00').toLocaleDateString(loc(),{day:'numeric',month:'short'}):'?';
  const tStr=tv?new Date(tv+'T12:00:00').toLocaleDateString(loc(),{day:'numeric',month:'short'}):'?';
  let nights='';
  if(fv&&tv){
    const diff=Math.round((new Date(tv)-new Date(fv))/864e5);
    if(diff>=0) nights=`<span class="dp-nights">${diff} ${diff===1?(S.lang==='en'?'night':'noche'):(S.lang==='en'?'nights':'noches')}</span>`;
  }
  prev.innerHTML=`<span>📅 ${fStr}</span><span class="dp-arrow">→</span><span>${tStr}</span>${nights}`;
}

// ─── RANGE PICKER — pure string, no DOM needed ──────────────────────────────
function rdpHTML(containerId, fromVal, toVal, monthOffset) {
  const today = new Date();
  const ref = fromVal ? new Date(fromVal + 'T12:00') : new Date();
  ref.setMonth(ref.getMonth() + (monthOffset||0));
  const month = ref.getMonth();
  const year  = ref.getFullYear();
  const todayStr = today.toLocaleDateString('en-CA');
  const months   = S.lang==='en' ? MONTHS_EN : MONTHS_ES;
  const dayNames = S.lang==='en' ? DAYS_EN   : DAYS_ES;
  const lastDay  = new Date(year, month+1, 0).getDate();
  const startDow = (new Date(year, month, 1).getDay() + 6) % 7;

  let grid = dayNames.map(d=>`<div class="rdp-dh">${d}</div>`).join('');
  for (let i=0;i<startDow;i++) grid += `<div class="rdp-empty"></div>`;
  for (let d=1;d<=lastDay;d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isFrom = ds===fromVal, isTo=ds===toVal;
    const inRange = fromVal&&toVal&&ds>fromVal&&ds<toVal;
    const isToday = ds===todayStr;
    let cls='rdp-d';
    if(isFrom||isTo) cls+=' rdp-sel';
    else if(inRange)  cls+=' rdp-range';
    else if(isToday)  cls+=' rdp-today';
    grid += `<div class="${cls}" onclick="rpClick('${containerId}','${containerId}-f','${containerId}-t','${ds}')">${d}</div>`;
  }

  let preview='';
  if(fromVal&&toVal){
    const [fy,fm,fd]=fromVal.split('-').map(Number);
    const [ty,tm,td]=toVal.split('-').map(Number);
    const fDate=new Date(fy,fm-1,fd), tDate=new Date(ty,tm-1,td);
    const diff=Math.round((tDate-fDate)/86400000)+1;
    const fl=fDate.toLocaleDateString(loc(),{day:'numeric',month:'short'});
    const tl=tDate.toLocaleDateString(loc(),{day:'numeric',month:'short'});
    preview=`${fl} → ${tl} · ${diff} ${S.lang==='en'?'days':'días'}`;
  } else if(fromVal){
    preview=S.lang==='en'?'Now tap end date →':'Ahora tocá la fecha de fin →';
  } else {
    preview=S.lang==='en'?'Tap start date':'Tocá la fecha de inicio';
  }

  return `<div id="${containerId}-wrap" class="rdp">
    <div class="rdp-nav">
      <button class="rdp-btn" onclick="rpNav('${containerId}',-1)">‹</button>
      <span class="rdp-title">${months[month]} ${year}</span>
      <button class="rdp-btn" onclick="rpNav('${containerId}',1)">›</button>
    </div>
    <div class="rdp-grid">${grid}</div>
    <div class="rdp-preview">${preview}</div>
  </div>`;
}

// State for month navigation (keyed by containerId)
const _rdpOffsets = {};

function rpNav(cid, dir) {
  _rdpOffsets[cid] = (_rdpOffsets[cid]||0) + dir;
  const fv = document.getElementById(cid+'-f')?.value||'';
  const tv = document.getElementById(cid+'-t')?.value||'';
  const wrap = document.getElementById(cid+'-wrap');
  if(wrap) wrap.outerHTML = rdpHTML(cid, fv, tv, _rdpOffsets[cid]);
}

function rpClick(cid, fid, tid, ds) {
  const fromEl=document.getElementById(fid), toEl=document.getElementById(tid);
  if(!fromEl||!toEl) return;
  const fv=fromEl.value, tv=toEl.value;
  if(!fv||(fv&&tv)){ fromEl.value=ds; toEl.value=''; }
  else {
    if(ds<fv){ toEl.value=fv; fromEl.value=ds; }
    else if(ds===fv){ toEl.value=ds; } // 1-day range
    else { toEl.value=ds; }
  }
  _rdpOffsets[cid]=_rdpOffsets[cid]||0;
  const wrap=document.getElementById(cid+'-wrap');
  if(wrap) wrap.outerHTML=rdpHTML(cid,fromEl.value,toEl.value,_rdpOffsets[cid]);
}

          t.segments.push({

            destLat:String(city.lat||''),destLon:String(city.lon||''),

        <div style="${card};padding:14px 16px;display:flex;align-items:center;gap:12px">
          <img src="/icon-192.png" style="width:48px;height:48px;border-radius:14px;flex-shrink:0" onerror="this.style.display='none'">
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:700;color:#fff;letter-spacing:-.01em">Bitacora</div>
            <div style="font-size:12px;color:rgba(255,255,255,.45);margin-top:2px">${es ? 'Instalá la app en tu celular' : 'Install app on your phone'}</div>
          </div>
          <button onclick="installPWA()" style="padding:10px 16px;background:#2563EB;border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;white-space:nowrap">${es ? 'Instalar' : 'Install'}</button>
          <button onclick="dismissInstallBanner()" style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.09);border:none;color:rgba(255,255,255,.5);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0">✕</button>
        </div>
      </div>`;
  }

  document.body.appendChild(banner);
}

async function installPWA() {
  if (!_deferredPrompt) return;
  _deferredPrompt.prompt();
  const { outcome } = await _deferredPrompt.userChoice;
  _deferredPrompt = null;
  dismissInstallBanner();
  if (outcome === 'accepted') toast(S.lang === 'en' ? '✓ App installed!' : '✓ ¡App instalada!');
}

function dismissInstallBanner() {
  const b = document.getElementById('pwa-banner');
  if (b) { b.style.transform = 'translateY(100%)'; b.style.opacity = '0'; b.style.transition = '.25s ease'; setTimeout(() => b.remove(), 260); }
  try { localStorage.setItem('btc-pwa-d', Date.now()); } catch(e) {}
}

// iOS: show after 5s if not standalone and not dismissed
window.addEventListener('load', () => {
  if (_isIOS && !_isStandalone && !_pwaDismissed()) {
    setTimeout(showInstallBanner, 5000);
  }
});
</script>
</body>
</html>
