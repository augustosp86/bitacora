// ─── SEGMENT DAY STRIP PICKER ────────────────────────────────────────────────
function wireSegDayStrip() {
  const strip = document.getElementById('seg-day-strip');
  if (!strip) return;
  const t = trip(); if (!t) return;

  function render_strip() {
    const fromVal = document.getElementById('seg-from')?.value || '';
    const toVal   = document.getElementById('seg-to')?.value   || '';
    const prev    = document.getElementById('seg-date-prev');

    // Build day bubbles
    let html = '<div style="display:flex;flex-wrap:wrap;gap:5px">';
    t.days.forEach((d, i) => {
      const ds = d.date.split('T')[0];
      const isFrom = ds === fromVal;
      const isTo   = ds === toVal;
      // Find which segment owns this day (excluding the one being edited)
      const rawSeg = segForDay(t, i);
      const editIdx = S.editSegIdx;
      const ownedBySelf = editIdx !== null && t.segments[editIdx] && i >= t.segments[editIdx].fromIdx && i <= t.segments[editIdx].toIdx;
      const ownedByOther = rawSeg && !ownedBySelf;
      const otherSi = ownedByOther ? t.segments.indexOf(rawSeg) : -1;

      // Is in current selection range?
      const inRange = fromVal && toVal && ds >= fromVal && ds <= toVal;
      const inSelf  = fromVal && !toVal && ds === fromVal;

      const dayNum = i + 1;
      const dateObj = new Date(d.date + 'T00:00');
      const label = dateObj.toLocaleDateString(S.lang === 'en' ? 'en-US' : 'es-ES', {day:'numeric',month:'short'});

      let bg, border, color, fw='500';
      if (isFrom || isTo) {
        bg = '#1A1714'; color = 'white'; border = '#1A1714'; fw = '800';
      } else if (inRange) {
        bg = '#BFDBFE'; color = '#1D4ED8'; border = '#3B82F6'; fw = '700';
      } else if (ownedByOther) {
        const col = destColor(otherSi);
        bg = col + '22'; color = col; border = col + '66';
      } else {
        bg = '#E8E4DD'; color = '#5C5650'; border = '#C8C0B8';
      }

      const cursor = ownedByOther ? 'default' : 'pointer';
      html += `<div onclick="segStripClick('${ds}')" style="cursor:${cursor};padding:6px 9px;border-radius:8px;background:${bg};color:${color};border:1.5px solid ${border};font-size:10px;font-weight:${fw};text-align:center;min-width:38px;transition:all .1s">
        <div style="font-size:11px;font-weight:700">${dayNum}</div>
        <div style="font-size:9px;opacity:.8">${label}</div>
      </div>`;
    });
    html += '</div>';
    strip.innerHTML = html;

    // Update preview
    if (prev) {
      if (fromVal && toVal) {
        const diff = t.days.findIndex(d => d.date.split('T')[0] === toVal) - t.days.findIndex(d => d.date.split('T')[0] === fromVal) + 1;
        const f = new Date(fromVal + 'T00:00').toLocaleDateString(S.lang === 'en' ? 'en-US' : 'es-ES', {day:'numeric',month:'short'});
        const tv = new Date(toVal + 'T00:00').toLocaleDateString(S.lang === 'en' ? 'en-US' : 'es-ES', {day:'numeric',month:'short'});
        prev.textContent = `${f} → ${tv} · ${diff} ${S.lang === 'en' ? 'days' : 'días'}`;
      } else if (fromVal) {
        prev.textContent = S.lang === 'en' ? '→ Now tap end date' : '→ Ahora tocá la fecha de fin';
      } else {
        prev.textContent = S.lang === 'en' ? 'Tap start day' : 'Tocá el día de inicio';
      }
    }
  }

  strip._renderFn = render_strip;
  render_strip();
}

function segStripClick(ds) {
  const fromEl = document.getElementById('seg-from');
  const toEl   = document.getElementById('seg-to');
  if (!fromEl || !toEl) return;
  const fv = fromEl.value, tv = toEl.value;
  if (!fv || (fv && tv)) {
    fromEl.value = ds; toEl.value = '';
  } else {
    if (ds < fv) { toEl.value = fv; fromEl.value = ds; }
    else if (ds === fv) { fromEl.value = ''; }
    else { toEl.value = ds; }
  }
  const strip = document.getElementById('seg-day-strip');
  if (strip?._renderFn) strip._renderFn();
}

// ─── DATE HELPERS ───
function onFromDate(fromId, toId, previewId) {
  const fromEl=document.getElementById(fromId);
  const toEl=document.getElementById(toId);
  if(!fromEl||!toEl) return;
  const fv=fromEl.value;
  if(!fv) return;
  // Update min of "to" field so end can't be before start
  toEl.min=fv;
  // Clear end date only if it's before the new start
  if(toEl.value && toEl.value<fv) { toEl.value=''; }
  updateDatePreview(fromId, toId, previewId);
}
function updateDatePreview(fromId, toId, previewId) {
  const fromEl=document.getElementById(fromId);
  const toEl=document.getElementById(toId);
  const prev=document.getElementById(previewId);
  if(!prev) return;
  const fv=fromEl?.value, tv=toEl?.value;
  if(!fv&&!tv){prev.style.display='none';return;}
  prev.style.display='flex';
  const fStr=fv?new Date(fv+'T12:00:00').toLocaleDateString(S.lang==='en'?'en-US':'es-ES',{day:'numeric',month:'short'}):'?';
  const tStr=tv?new Date(tv+'T12:00:00').toLocaleDateString(S.lang==='en'?'en-US':'es-ES',{day:'numeric',month:'short'}):'?';
  let nights='';
  if(fv&&tv){
    const diff=Math.round((new Date(tv)-new Date(fv))/864e5);
    if(diff>=0) nights=`<span class="dp-nights">${diff} ${diff===1?(S.lang==='en'?'night':'noche'):(S.lang==='en'?'nights':'noches')}</span>`;
  }
  prev.innerHTML=`<span>📅 ${fStr}</span><span class="dp-arrow">→</span><span>${tStr}</span>${nights}`;
}
// Wire date preview after render — show existing-value previews only
// (onchange handlers are inline in the HTML; no duplicate wiring needed)
function wireDatePreviews() {
  updateDatePreview('ss','se','trip-date-prev');
  updateDatePreview('es','ee','edit-date-prev');
  updateDatePreview('seg-from','seg-to','seg-date-prev');
}

// ─── INLINE RANGE DATE PICKER ──────────────────────────────────────────────
const MONTHS_ES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_ES=['Lu','Ma','Mi','Ju','Vi','Sa','Do'];
const DAYS_EN=['Mo','Tu','We','Th','Fr','Sa','Su'];

function buildRangeCal(containerId, fromId, toId) {
  const c = document.getElementById(containerId);
  if (!c) return;
  const fromEl = document.getElementById(fromId);
  const toEl = document.getElementById(toId);
  if (!fromEl || !toEl) return;

  // Init state on container
  if (c._rpMonth === undefined) {
    const ref = fromEl.value ? new Date(fromEl.value + 'T12:00') : new Date();
    c._rpMonth = ref.getMonth();
    c._rpYear = ref.getFullYear();
  }
  const month = c._rpMonth;
  const year = c._rpYear;
  // Use YYYY-MM-DD strings for comparison to avoid all timezone issues
  const todayStr = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD local
  const fromVal = fromEl.value;  // YYYY-MM-DD or ''
  const toVal = toEl.value;      // YYYY-MM-DD or ''

  const months = S.lang === 'en' ? MONTHS_EN : MONTHS_ES;
  const dayNames = S.lang === 'en' ? DAYS_EN : DAYS_ES;

  // Build grid
  const lastDay = new Date(year, month + 1, 0).getDate();
  const startDow = (new Date(year, month, 1).getDay() + 6) % 7; // Mon-first

  let grid = '';
  dayNames.forEach(d => { grid += `<div class="rdp-dh">${d}</div>`; });
  for (let i = 0; i < startDow; i++) grid += `<div class="rdp-empty"></div>`;

  for (let d = 1; d <= lastDay; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isFrom = ds === fromVal;
    const isTo   = ds === toVal;
    const inRange = fromVal && toVal && ds > fromVal && ds < toVal;
    const isToday = ds === todayStr;

    let cls = 'rdp-d';
    if (isFrom || isTo) cls += ' rdp-sel';
    else if (inRange) cls += ' rdp-range';
    else if (isToday) cls += ' rdp-today';

    grid += `<div class="${cls}" onclick="rpClick('${containerId}','${fromId}','${toId}','${ds}')">${d}</div>`;
  }

  // Preview text
  let preview = '';
  if (from && to) {
    const diff = Math.round((to - from) / 86400000);
    const f = from.toLocaleDateString(S.lang==='en'?'en-US':'es-ES',{day:'numeric',month:'short'});
    const t2 = to.toLocaleDateString(S.lang==='en'?'en-US':'es-ES',{day:'numeric',month:'short'});
    preview = `${f} → ${t2} · ${diff+1} ${S.lang==='en'?'days':'días'}`;
  } else if (from) {
    preview = S.lang === 'en' ? 'Now select the end date →' : 'Ahora seleccioná la fecha de fin →';
  } else {
    preview = S.lang === 'en' ? 'Tap start date' : 'Tocá la fecha de inicio';
  }

  c.innerHTML = `<div class="rdp">
    <div class="rdp-nav">
      <button class="rdp-btn" onclick="rpPrev('${containerId}','${fromId}','${toId}')">‹</button>
      <span class="rdp-title">${months[month]} ${year}</span>
      <button class="rdp-btn" onclick="rpNext('${containerId}','${fromId}','${toId}')">›</button>
    </div>
    <div class="rdp-grid">${grid}</div>
    <div class="rdp-preview">${preview}</div>
  </div>`;
}

function rpClick(cid, fid, tid, ds) {
  const fromEl = document.getElementById(fid);
  const toEl = document.getElementById(tid);
  if (!fromEl || !toEl) return;
  const fv = fromEl.value, tv = toEl.value;
  if (!fv || (fv && tv)) {
    // Start fresh
    fromEl.value = ds; toEl.value = '';
  } else {
    if (ds < fv) { toEl.value = fv; fromEl.value = ds; }
    else if (ds === fv) { fromEl.value = ''; }
    else { toEl.value = ds; }
  }
  const c = document.getElementById(cid);
  if (c) { delete c._rpMonth; delete c._rpYear; }
  buildRangeCal(cid, fid, tid);
}

function rpPrev(cid, fid, tid) {
  const c = document.getElementById(cid); if (!c) return;
  c._rpMonth--; if (c._rpMonth < 0) { c._rpMonth = 11; c._rpYear--; }
  buildRangeCal(cid, fid, tid);
}

function rpNext(cid, fid, tid) {
  const c = document.getElementById(cid); if (!c) return;
  c._rpMonth++; if (c._rpMonth > 11) { c._rpMonth = 0; c._rpYear++; }
  buildRangeCal(cid, fid, tid);
}

function wireRangePicker() {
  if (S.sheet === 'new') {
    setTimeout(() => buildRangeCal('trip-rdp', 'ss', 'se'), 50);
  }
  if (S.sheet === 'edit') {
    setTimeout(() => buildRangeCal('edit-rdp', 'es', 'ee'), 50);
  }
}

      <style>
        @keyframes pwaSlideUp { from { transform:translateY(100%); opacity:0; } to { transform:translateY(0); opacity:1; } }
        #pwa-banner * { box-sizing:border-box; font-family:'Geist',system-ui,sans-serif; }
      </style>
      <div style="${wrap}">
        <div style="${card};padding:14px 16px;display:flex;align-items:center;gap:12px">
          <img src="/icon-192.png" style="width:48px;height:48px;border-radius:14px;flex-shrink:0" onerror="this.style.display='none'">
          <div style="flex:1;min-width:0">
            <div style="font-size:15px;font-weight:700;color:#fff;letter-spacing:-.01em">Bitacora</div>
            <div style="font-size:12px;color:rgba(255,255,255,.45);margin-top:2px">${es ? 'Instalá la app en tu celular' : 'Install app on your phone'}</div>
          </div>
          <button onclick="installPWA()" style="padding:10px 16px;background:#2563EB;border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;white-space:nowrap">${es ? 'Instalar' : 'Install'}</button>
          <button onclick="dismissInstallBanner()" style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.09);border:none;color:rgba(255,255,255,.5);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0">✕</button>
        </div>
      </div>`;
  }

  document.body.appendChild(banner);
}

async function installPWA() {
  if (!_deferredPrompt) return;
  _deferredPrompt.prompt();
  const { outcome } = await _deferredPrompt.userChoice;
  _deferredPrompt = null;
  dismissInstallBanner();
  if (outcome === 'accepted') toast(S.lang === 'en' ? '✓ App installed!' : '✓ ¡App instalada!');
}

function dismissInstallBanner() {
  const b = document.getElementById('pwa-banner');
  if (b) { b.style.transform = 'translateY(100%)'; b.style.opacity = '0'; b.style.transition = '.25s ease'; setTimeout(() => b.remove(), 260); }
  try { localStorage.setItem('btc-pwa-d', Date.now()); } catch(e) {}
}

// iOS: show after 5s if not standalone and not dismissed
window.addEventListener('load', () => {
  if (_isIOS && !_isStandalone && !_pwaDismissed()) {
    setTimeout(showInstallBanner, 5000);
  }
});
</script>
</body>
</html>
