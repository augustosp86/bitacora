<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </radialGradient>
    <radialGradient id="ocean" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </radialGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="globe-clip">
      <circle cx="256" cy="256" r="168"/>
    </clipPath>
    <filter id="soft" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- Globe base (ocean) -->
  <circle cx="256" cy="256" r="168" fill="url(#ocean)"/>

  <!-- Grid lines clipped to globe -->
  <g clip-path="url(#globe-clip)" opacity="0.35" stroke="white" stroke-width="1.8" fill="none">
    <!-- Latitude lines -->
    <ellipse cx="256" cy="162" rx="120" ry="18"/>
    <ellipse cx="256" cy="215" rx="158" ry="24"/>
    <line x1="88" y1="256" x2="424" y2="256"/>
    <ellipse cx="256" cy="297" rx="158" ry="24"/>
    <ellipse cx="256" cy="350" rx="120" ry="18"/>
    <!-- Longitude lines -->
    <ellipse cx="256" cy="256" rx="16" ry="168"/>
    <ellipse cx="256" cy="256" rx="70" ry="168"/>
    <ellipse cx="256" cy="256" rx="130" ry="168"/>
  </g>

  <!-- Continents clipped to globe -->
  <g clip-path="url(#globe-clip)" fill="white" fill-opacity="0.9">
    <!-- North America -->
    <path d="M118,148 L160,138 L175,162 L168,188 L176,210
             L158,218 L142,208 L122,212 L110,192 L112,168 Z"/>
    <!-- South America -->
    <path d="M160,222 L184,216 L190,238 L184,282
             L164,308 L144,298 L136,272 L144,248 Z"/>
    <!-- Europe -->
    <path d="M238,138 L268,142 L278,158 L268,170
             L252,172 L240,162 L234,148 Z"/>
    <!-- Africa -->
    <path d="M244,172 L278,176 L294,196 L288,228
             L276,292 L256,302 L238,290 L230,258
             L234,220 L238,192 Z"/>
    <!-- Asia (main) -->
    <path d="M272,134 L340,142 L370,164 L360,190
             L336,202 L308,196 L284,182 L272,158 Z"/>
    <!-- India -->
    <path d="M300,196 L320,202 L314,230 L296,224 L290,206 Z"/>
    <!-- Australia -->
    <path d="M334,234 L376,228 L390,252 L376,280
             L348,280 L332,260 Z"/>
  </g>

  <!-- Globe shine overlay -->
  <circle cx="256" cy="256" r="168" fill="url(#shine)"/>

  <!-- Globe outline ring -->
  <circle cx="256" cy="256" r="166" fill="none" stroke="white" stroke-opacity="0.5" stroke-width="3"/>

  <!-- Top-left specular highlight arc -->
  <path d="M 160,148 A 130,130 0 0 1 310,138" fill="none"
        stroke="white" stroke-opacity="0.55" stroke-width="5"
        stroke-linecap="round"/>
</svg>
